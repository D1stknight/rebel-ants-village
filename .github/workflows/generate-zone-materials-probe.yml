name: Generate Ant Zone Materials Probe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-zone-materials-probe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate zone materials probe GLB
        run: node scripts/create-ant-zone-materials-probe.mjs

      - name: Confirm generated file
        run: ls -lh assets/character/ant_idle_c_zone_materials_probe.glb

      - name: Commit generated GLB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/character/ant_idle_c_zone_materials_probe.glb
          git commit -m "Add ant zone materials probe GLB" || echo "No changes to commit"
          git push origin dev
