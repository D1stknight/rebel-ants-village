<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebel Ants — WebGPU Smoke Test</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #050711;
    font-family: Arial, sans-serif;
  }
  #c {
    width: 100%;
    height: 100%;
    display: block;
    touch-action: none;
  }
  #badge {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 10;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 8px;
    color: #fff;
    background: rgba(0,0,0,.65);
    letter-spacing: 1px;
    font-size: 13px;
    backdrop-filter: blur(10px);
  }
  #status {
    position: fixed;
    left: 16px;
    bottom: 16px;
    z-index: 10;
    max-width: 720px;
    padding: 12px 14px;
    border: 1px solid rgba(232,197,106,.35);
    border-radius: 8px;
    color: #e8c56a;
    background: rgba(0,0,0,.65);
    font-size: 13px;
    line-height: 1.45;
    backdrop-filter: blur(10px);
  }
</style>
</head>
<body>
<div id="badge">Starting…</div>
<div id="status">Loading Babylon 9.4.1 smoke test…</div>
<canvas id="c"></canvas>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script>
(async function(){
  const canvas = document.getElementById('c');
  const badge = document.getElementById('badge');
  const status = document.getElementById('status');

  let engine;
  let mode = 'WebGL';

  try {
    const wantsWebGPU = !!navigator.gpu && BABYLON.WebGPUEngine;

    if (wantsWebGPU) {
      badge.textContent = 'Trying WebGPU…';
      status.textContent = 'navigator.gpu detected. Initializing BABYLON.WebGPUEngine…';

      engine = new BABYLON.WebGPUEngine(canvas, {
        antialias: true,
        adaptToDeviceRatio: true
      });

      await engine.initAsync();
      mode = 'WebGPU';
    } else {
      throw new Error('WebGPU unavailable in this browser, falling back to WebGL.');
    }
  } catch (err) {
    console.warn('WebGPU init failed or unavailable. Falling back to WebGL:', err);
    engine = new BABYLON.Engine(canvas, true, {
      preserveDrawingBuffer: true,
      stencil: true,
      adaptToDeviceRatio: true
    });
    mode = 'WebGL fallback';
  }

  badge.textContent = mode;
  badge.style.borderColor = mode === 'WebGPU' ? '#5ecfca' : '#e8c56a';
  badge.style.color = mode === 'WebGPU' ? '#5ecfca' : '#e8c56a';

  const scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0.03, 0.04, 0.10, 1);

  const camera = new BABYLON.ArcRotateCamera(
    'camera',
    -Math.PI / 2,
    Math.PI / 3,
    7,
    new BABYLON.Vector3(0, 1, 0),
    scene
  );
  camera.attachControl(canvas, true);

  const hemi = new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0, 1, 0), scene);
  hemi.intensity = 0.7;

  const point = new BABYLON.PointLight('goldLight', new BABYLON.Vector3(2, 4, -2), scene);
  point.diffuse = new BABYLON.Color3(1, 0.72, 0.22);
  point.intensity = 1.5;
  point.range = 12;

  const ground = BABYLON.MeshBuilder.CreateGround('ground', { width: 8, height: 8 }, scene);
  const groundMat = new BABYLON.StandardMaterial('groundMat', scene);
  groundMat.diffuseColor = new BABYLON.Color3(0.12, 0.16, 0.12);
  ground.material = groundMat;

  const sphere = BABYLON.MeshBuilder.CreateSphere('sphere', { diameter: 1.7, segments: 32 }, scene);
  sphere.position.y = 1.05;
  const sphereMat = new BABYLON.PBRMaterial('sphereMat', scene);
  sphereMat.albedoColor = new BABYLON.Color3(0.95, 0.55, 0.12);
  sphereMat.metallic = 0.45;
  sphereMat.roughness = 0.35;
  sphere.material = sphereMat;

  const box = BABYLON.MeshBuilder.CreateBox('rebelBox', { size: 1.25 }, scene);
  box.position = new BABYLON.Vector3(-2.2, 0.8, 0);
  const boxMat = new BABYLON.StandardMaterial('boxMat', scene);
  boxMat.diffuseColor = new BABYLON.Color3(0.25, 0.12, 0.55);
  boxMat.emissiveColor = new BABYLON.Color3(0.08, 0.02, 0.18);
  box.material = boxMat;

  const torus = BABYLON.MeshBuilder.CreateTorus('torus', { diameter: 1.5, thickness: 0.18, tessellation: 48 }, scene);
  torus.position = new BABYLON.Vector3(2.25, 1.1, 0);
  const torusMat = new BABYLON.StandardMaterial('torusMat', scene);
  torusMat.diffuseColor = new BABYLON.Color3(0.05, 0.75, 0.70);
  torusMat.emissiveColor = new BABYLON.Color3(0.01, 0.12, 0.11);
  torus.material = torusMat;

  const start = performance.now();
  let frames = 0;
  let lastReport = start;
  let lastFPS = 0;

  engine.runRenderLoop(() => {
    const t = performance.now() * 0.001;
    sphere.rotation.y = t * 0.6;
    box.rotation.x = t * 0.55;
    box.rotation.y = t * 0.8;
    torus.rotation.x = t * 0.45;
    torus.rotation.y = t * 0.9;

    scene.render();
    frames++;

    const now = performance.now();
    if (now - lastReport > 1000) {
      lastFPS = Math.round(engine.getFps());
      status.innerHTML = '<strong>' + mode + ' smoke test running.</strong><br>' +
        'FPS: ' + lastFPS + '<br>' +
        'Frames rendered: ' + frames + '<br>' +
        'If you see the orange sphere, purple cube, cyan ring, and green floor, the render path is painting correctly.';
      lastReport = now;
    }
  });

  window.addEventListener('resize', () => engine.resize());
})();
</script>
</body>
</html>
