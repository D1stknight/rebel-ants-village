<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebel Ants — Village WebGPU Test Wrapper</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #020818;
    color: #e8c56a;
    font-family: Arial, sans-serif;
  }
  #boot {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    text-align: center;
  }
  #boot h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 3px;
  }
  #boot p {
    max-width: 620px;
    color: rgba(255,255,255,.72);
    line-height: 1.5;
  }
</style>
</head>
<body>
<div id="boot">
  <h1>REBEL ANTS WEBGPU VILLAGE TEST</h1>
  <p>Loading the current village through a temporary WebGPU wrapper. The real village.html file is not changed.</p>
</div>
<script>
(async function(){
  const wantsWebGPU = new URLSearchParams(location.search).get('engine') === 'webgpu';

  try {
    let html = await fetch('village.html?webgpu_test_cache=' + Date.now(), { cache: 'no-store' }).then(r => r.text());
    const scriptClose = '<' + '/script>';

    html = html.replace(
      '<title>Rebel Ants — The Hidden Village</title>',
      '<title>Rebel Ants — The Hidden Village [WebGPU Test]</title>'
    );

    html = html.replace(
      '<script>\nconst canvas=document.getElementById(\'c\');',
      '<script>\n(async function(){\nconst canvas=document.getElementById(\'c\');'
    );

    const oldEngineBlock = `// ── ENGINE ───────────────────────────────────
// WebGPU support coming — using stable WebGL
// window._gpuMode reserved for future GPU upgrade path
const engine=new BABYLON.Engine(canvas,true,{preserveDrawingBuffer:true,stencil:true,adaptToDeviceRatio:true});
window._gpuMode = 'webgl';
function updateGPUBadge() {
  const badge = document.getElementById('gpuBadge');
  if (!badge) return;
  badge.textContent = 'WebGL';
  badge.style.color = '#888';
  badge.style.borderColor = '#555';
}`;

    const newEngineBlock = `// ── ENGINE ───────────────────────────────────
let engine;
window._gpuMode = 'webgl';

async function createPreferredEngine() {
  const useWebGPU = ${wantsWebGPU ? 'true' : 'false'};

  if (useWebGPU && navigator.gpu && BABYLON.WebGPUEngine) {
    try {
      setSt('Initializing WebGPU...');
      const webgpuEngine = new BABYLON.WebGPUEngine(canvas, {
        antialias: true,
        adaptToDeviceRatio: true
      });
      await webgpuEngine.initAsync();
      window._gpuMode = 'webgpu';
      return webgpuEngine;
    } catch (err) {
      console.warn('WebGPU failed. Falling back to WebGL.', err);
    }
  }

  window._gpuMode = 'webgl';
  return new BABYLON.Engine(canvas,true,{preserveDrawingBuffer:true,stencil:true,adaptToDeviceRatio:true});
}

engine = await createPreferredEngine();

function updateGPUBadge() {
  const badge = document.getElementById('gpuBadge');
  if (!badge) return;
  badge.style.display = 'block';
  if (window._gpuMode === 'webgpu') {
    badge.textContent = 'WebGPU TEST — LIGHT CAP 3';
    badge.style.color = '#5ecfca';
    badge.style.borderColor = '#5ecfca';
  } else {
    badge.textContent = 'WebGL FALLBACK';
    badge.style.color = '#e8c56a';
    badge.style.borderColor = '#e8c56a';
  }
}
updateGPUBadge();

function applyWebGPUTestLightCap() {
  if (window._gpuMode !== 'webgpu' || !scene) return;

  scene.materials.forEach(function(mat) {
    if (!mat) return;
    if ('maxSimultaneousLights' in mat) {
      mat.maxSimultaneousLights = 3;
      if (mat.markAsDirty && BABYLON.Material && BABYLON.Material.LightDirtyFlag !== undefined) {
        mat.markAsDirty(BABYLON.Material.LightDirtyFlag);
      }
    }
  });

  scene.meshes.forEach(function(mesh) {
    if (!mesh || !mesh.material) return;
    if ('maxSimultaneousLights' in mesh.material) {
      mesh.material.maxSimultaneousLights = 3;
      if (mesh.material.markAsDirty && BABYLON.Material && BABYLON.Material.LightDirtyFlag !== undefined) {
        mesh.material.markAsDirty(BABYLON.Material.LightDirtyFlag);
      }
    }
  });
}

let _webgpuLightCapFrame = 0;`;

    if (!html.includes(oldEngineBlock)) {
      throw new Error('Could not find the expected engine bootstrap block in village.html. Wrapper did not modify the village.');
    }

    html = html.replace(oldEngineBlock, newEngineBlock);

    html = html.replace(
      'scene.render();',
      `if (window._gpuMode === 'webgpu') {
      _webgpuLightCapFrame++;
      if (_webgpuLightCapFrame < 240 || _webgpuLightCapFrame % 60 === 0) {
        applyWebGPUTestLightCap();
      }
    }
    scene.render();`
    );

    const exposeGlobals = `
try {
  [
    'toggleWalk',
    'spawnAssetFromPanel',
    'uploadGLB',
    'setGizmoMode',
    'flipSelected',
    'rotateSelectedBy',
    'scaleSelected',
    'duplicateSelectedFence',
    'deleteSelectedFence',
    'addSignButton',
    'applySignEditor',
    'applyToroColor',
    'toggleWorklight',
    'saveWorldLayout',
    'loadWorldLayout'
  ].forEach(function(name){
    try {
      const fn = eval(name);
      if (typeof fn === 'function') window[name] = fn;
    } catch (e) {}
  });
} catch (e) {
  console.warn('WebGPU wrapper global expose step skipped:', e);
}
})();`;

    html = html.replace('\n' + scriptClose + '\n</body>\n</html>', exposeGlobals + '\n' + scriptClose + '\n</body>\n</html>');

    document.open();
    document.write(html);
    document.close();
  } catch (err) {
    console.error(err);
    document.body.innerHTML = '<div id="boot"><h1>WEBGPU WRAPPER FAILED</h1><p>' + err.message + '</p><p>The real village.html file was not changed.</p></div>';
  }
})();
</script>
</body>
</html>
