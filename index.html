<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebel Ants — The Hidden Village</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Serif+JP:wght@300;400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a14;font-family:'Noto Serif JP',serif}
#c{width:100%;height:100%;touch-action:none;display:block}
#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:20px 28px;pointer-events:none;z-index:10}
#logo h1{font-family:'Cinzel Decorative',serif;font-size:22px;font-weight:900;color:#e8c56a;letter-spacing:4px;text-shadow:0 0 25px rgba(232,197,106,.8),0 2px 8px rgba(0,0,0,.9);line-height:1}
#logo span{font-size:10px;letter-spacing:7px;color:#5ecfca;text-transform:uppercase;margin-top:5px;display:block;text-shadow:0 0 10px rgba(94,207,202,.6)}
#ctrl{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:2px;text-align:right;line-height:2.2;text-transform:uppercase}
#ctrl kbd{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:3px;padding:1px 6px;font-size:9px;color:#e8c56a}
#td{position:fixed;top:20px;left:50%;transform:translateX(-50%);font-family:'Cinzel Decorative',serif;font-size:11px;color:rgba(232,197,106,.65);letter-spacing:3px;pointer-events:none;z-index:10}
#xhair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:8;opacity:0;transition:opacity .3s;width:22px;height:22px}
#xhair.on{opacity:1}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.8);border-radius:1px}
#xhair::before{width:16px;height:2px;top:10px;left:3px}
#xhair::after{width:2px;height:16px;top:3px;left:10px}
#wb{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(5,10,28,.92);border:1px solid rgba(232,197,106,.55);color:#e8c56a;font-family:'Cinzel Decorative',serif;font-size:11px;letter-spacing:3px;padding:13px 32px;cursor:pointer;z-index:10;transition:all .25s;backdrop-filter:blur(12px)}
#wb:hover{background:rgba(232,197,106,.18)}
#wb.on{background:rgba(232,197,106,.22);border-color:#e8c56a}
#tt{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);background:rgba(5,10,28,.95);border:1px solid rgba(232,197,106,.45);padding:13px 28px;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s;z-index:20;backdrop-filter:blur(12px);white-space:nowrap}
#tt h3{font-family:'Cinzel Decorative',serif;font-size:12px;color:#e8c56a;letter-spacing:2px;margin-bottom:3px}
#tt p{font-size:10px;color:#5ecfca;letter-spacing:1px}
#tt.on{opacity:1}
#panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.9);width:480px;max-width:92vw;max-height:88vh;overflow-y:auto;background:rgba(5,10,28,.97);border:1px solid rgba(232,197,106,.5);padding:38px;z-index:30;opacity:0;pointer-events:none;transition:all .4s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(22px)}
#panel.on{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1)}
#pc{position:absolute;top:14px;right:18px;background:none;border:none;color:rgba(232,197,106,.5);font-size:22px;cursor:pointer;transition:color .2s;line-height:1}
#pc:hover{color:#e8c56a}
#ph2{font-family:'Cinzel Decorative',serif;font-size:16px;color:#e8c56a;letter-spacing:2px;margin-bottom:6px}
.psb{font-size:10px;color:#5ecfca;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;border-bottom:1px solid rgba(232,197,106,.12);padding-bottom:16px}
#pdesc{font-size:13px;color:rgba(255,255,255,.75);line-height:2;margin-bottom:20px}
#picon{font-size:42px;margin-bottom:16px;display:block}
.pl{display:flex;flex-wrap:wrap;gap:8px}
.pb{display:inline-block;background:linear-gradient(135deg,#e8c56a,#c9993a);color:#020818;font-family:'Cinzel Decorative',serif;font-size:10px;letter-spacing:2px;padding:10px 18px;border:none;cursor:pointer;text-decoration:none;transition:opacity .2s}
.pb:hover{opacity:.82}.pb.g{background:transparent;border:1px solid rgba(232,197,106,.4);color:#e8c56a}
.pb.t{background:linear-gradient(135deg,#5ecfca,#2a9090);color:#020818}
.pb.r{background:linear-gradient(135deg,#c0392b,#8a1a10);color:#fff}
#ld{position:fixed;inset:0;background:#020818;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .9s}
#ld h1{font-family:'Cinzel Decorative',serif;font-size:30px;color:#e8c56a;letter-spacing:5px;margin-bottom:10px;text-shadow:0 0 40px rgba(232,197,106,.6)}
#ld .sub{font-size:10px;color:#5ecfca;letter-spacing:7px;text-transform:uppercase;margin-bottom:48px;animation:pulse 2s infinite}
#ldst{font-size:10px;color:rgba(232,197,106,.45);letter-spacing:2px;margin-top:18px;text-transform:uppercase;text-align:center}
.lb{width:240px;height:2px;background:rgba(232,197,106,.1);position:relative;overflow:hidden}
.lf{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,#e8c56a,transparent);animation:sw 1.6s infinite}
@keyframes sw{to{left:100%}}@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<div id="ld"><h1>REBEL ANTS</h1><div class="sub">Building the Hidden Village...</div><div class="lb"><div class="lf"></div></div><div id="ldst">Initializing...</div></div>
<canvas id="c"></canvas>
<div id="xhair"></div>
<div id="td"></div>
<div id="hud">
  <div id="logo"><h1>REBEL ANTS</h1><span>The Hidden Village</span></div>
  <div id="ctrl"><kbd>W A S D</kbd> Walk<br><kbd>Mouse</kbd> Look<br><kbd>Click</kbd> Enter<br><kbd>ESC</kbd> Orbit</div>
</div>
<button id="wb" onclick="toggleWalk()">⚔️ &nbsp;ENTER VILLAGE</button>
<div id="tt"><h3 id="tth">—</h3><p id="ttp">Click to enter</p></div>
<div id="panel">
  <button id="pc">✕</button>
  <span id="picon">⚔️</span>
  <h2 id="ph2">—</h2>
  <div class="psb" id="psub">Rebel Ants</div>
  <p id="pdesc">—</p>
  <div class="pl" id="pact"></div>
</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
<script>
const canvas=document.getElementById('c');
const engine=new BABYLON.Engine(canvas,true,{preserveDrawingBuffer:true,stencil:true,adaptToDeviceRatio:true});
const setSt=t=>{document.getElementById('ldst').textContent=t;};

// ── SCENE ───────────────────────────────────
const scene=new BABYLON.Scene(engine);
scene.clearColor=new BABYLON.Color4(.45,.65,.88,1);
scene.fogMode=BABYLON.Scene.FOGMODE_EXP;
scene.fogDensity=0.006;
scene.fogColor=new BABYLON.Color3(.55,.72,.9);

// ── CAMERAS ─────────────────────────────────
const orbit=new BABYLON.ArcRotateCamera("o",-Math.PI/2.1,Math.PI/3.6,150,new BABYLON.Vector3(0,6,0),scene);
orbit.lowerRadiusLimit=8; orbit.upperRadiusLimit=280; orbit.upperBetaLimit=Math.PI/2.05;
orbit.wheelPrecision=2; orbit.attachControl(canvas,true);

const walk = new BABYLON.UniversalCamera("w", new BABYLON.Vector3(0, 8, 35), scene);
walk.speed = 0;
walk.angularSensibility = 999999;
walk.keysUp = [];
walk.keysDown = [];
walk.keysLeft = [];
walk.keysRight = [];
walk.minZ = 0.2;

scene.activeCamera = orbit;
let walkMode = false;
// ── LIGHTING ────────────────────────────────
const sun=new BABYLON.DirectionalLight("sun",new BABYLON.Vector3(-.7,-1.1,.5),scene);
sun.position=new BABYLON.Vector3(160,260,-160);
sun.intensity=2.6; sun.diffuse=new BABYLON.Color3(1,.96,.88);

const hemi=new BABYLON.HemisphericLight("h",new BABYLON.Vector3(0,1,0),scene);
hemi.intensity=0.65; hemi.diffuse=new BABYLON.Color3(.52,.7,.98);
hemi.groundColor=new BABYLON.Color3(.25,.32,.16); hemi.specular=new BABYLON.Color3(0,0,0);

const shadows=new BABYLON.ShadowGenerator(2048,sun);
shadows.useBlurExponentialShadowMap=true; shadows.blurKernel=20; shadows.bias=0.001;

// ── PROCEDURAL SKY ───────────────────────────
const skybox=BABYLON.MeshBuilder.CreateBox("sky",{size:1400},scene);
const skyMat=new BABYLON.SkyMaterial("sm",scene);
skyMat.backFaceCulling=false; skyMat.turbidity=5; skyMat.luminance=1.0;
skyMat.rayleigh=2.5; skyMat.mieCoefficient=0.003; skyMat.mieDirectionalG=0.98;
skyMat.useSunPosition=true; skyMat.sunPosition=sun.position;
skybox.material=skyMat; skybox.infiniteDistance=true;

function updateSky(){
  const now=new Date(), h=now.getHours()+now.getMinutes()/60;
  const d=Math.max(0,Math.sin(((h/24)-.25)*Math.PI*2));
  skyMat.inclination=-Math.sin(((h/24)-.25)*Math.PI*2)*.5;
  sun.intensity=0.15+d*3.2; hemi.intensity=0.18+d*.62;
  if(h>=6&&h<9){sun.diffuse=new BABYLON.Color3(1,.62,.3);}
  else if(h>=9&&h<17){sun.diffuse=new BABYLON.Color3(1,.97,.88);}
  else if(h>=17&&h<20){sun.diffuse=new BABYLON.Color3(1,.48,.15);}
  else{sun.diffuse=new BABYLON.Color3(.18,.22,.48);sun.intensity=0.12;}
  scene.fogColor=h>=6&&h<20?new BABYLON.Color3(.58,.74,.9):new BABYLON.Color3(.04,.06,.16);
  const hh=now.getHours().toString().padStart(2,'0'),mm=now.getMinutes().toString().padStart(2,'0');
  const lbl=h<6||h>=20?'🌙 Night':h<9?'🌅 Sunrise':h<17?'☀️ Day':'🌇 Sunset';
  document.getElementById('td').textContent=`${hh}:${mm}  ·  ${lbl}`;
}
updateSky(); setInterval(updateSky,30000);

// ── HELPERS ──────────────────────────────────
function mat(c,o={}){const m=new BABYLON.StandardMaterial("m"+Math.random(),scene);m.diffuseColor=typeof c==='string'?BABYLON.Color3.FromHexString(c):c;m.specularColor=new BABYLON.Color3(.03,.03,.03);if(o.e)m.emissiveColor=typeof o.e==='string'?BABYLON.Color3.FromHexString(o.e):o.e;if(o.a)m.alpha=o.a;return m;}
function pbr(c,o={}){const m=new BABYLON.PBRMaterial("p"+Math.random(),scene);m.albedoColor=typeof c==='string'?BABYLON.Color3.FromHexString(c):c;m.metallic=o.m||0;m.roughness=o.r||.85;if(o.e){m.emissiveColor=typeof o.e==='string'?BABYLON.Color3.FromHexString(o.e):o.e;m.emissiveIntensity=o.ei||1;}if(o.a)m.alpha=o.a;return m;}
function box(w,h,d,mat,pos,ry=0){const b=BABYLON.MeshBuilder.CreateBox("b"+Math.random(),{width:w,height:h,depth:d},scene);b.material=mat;if(pos)b.position=new BABYLON.Vector3(pos[0],pos[1],pos[2]);if(ry)b.rotation.y=ry;b.receiveShadows=true;shadows.addShadowCaster(b);return b;}
function cyl(rt,rb,h,t,mat,pos,rz=0){const c=BABYLON.MeshBuilder.CreateCylinder("cy"+Math.random(),{diameterTop:rt,diameterBottom:rb,height:h,tessellation:t},scene);c.material=mat;if(pos)c.position=new BABYLON.Vector3(pos[0],pos[1],pos[2]);if(rz)c.rotation.z=rz;c.receiveShadows=true;shadows.addShadowCaster(c);return c;}
function sph(d,mat,pos){const s=BABYLON.MeshBuilder.CreateSphere("sp"+Math.random(),{diameter:d,segments:8},scene);s.material=mat;if(pos)s.position=new BABYLON.Vector3(pos[0],pos[1],pos[2]);s.receiveShadows=true;shadows.addShadowCaster(s);return s;}

// ── GROUND / TERRAIN ─────────────────────────
setSt("Building terrain...");
// Large grass base
const ground=BABYLON.MeshBuilder.CreateGround("gnd",{width:700,height:700,subdivisions:6},scene);
ground.material=mat(new BABYLON.Color3(.24,.38,.15)); ground.receiveShadows=true;

// Courtyard — stone tiles
const court=BABYLON.MeshBuilder.CreateGround("ct",{width:220,height:220},scene);
court.material=mat(new BABYLON.Color3(.52,.49,.42)); court.position.y=.06; court.receiveShadows=true;

// Inner plaza
const plaza=BABYLON.MeshBuilder.CreateGround("pl",{width:90,height:90},scene);
plaza.material=mat(new BABYLON.Color3(.62,.58,.48)); plaza.position.y=.1; plaza.receiveShadows=true;

// Paths
const pm=mat(new BABYLON.Color3(.44,.41,.34));
[[8,300,0,0],[300,8,0,0]].forEach(([w,h,x,z])=>{
  const p=BABYLON.MeshBuilder.CreateGround("pa",{width:w,height:h},scene);
  p.material=pm; p.position=new BABYLON.Vector3(x,.08,z); p.receiveShadows=true;
});

// ── REALISTIC MOUNTAINS ──────────────────────
setSt("Sculpting mountains...");
// Use multiple overlapping cones with noise-like variation for organic look
function mountain(x,z,r,h,col){
  const g=new BABYLON.TransformNode("mtg",scene);
  const segs=6+Math.floor(Math.random()*3);
  const mm=mat(col);
  // Main peak
  const main=cyl(0,r*2,h,segs,mm,[x,h/2-5,z]);
  main.rotation.y=Math.random()*Math.PI;
  // Add bulges for organic look
  for(let i=0;i<4;i++){
    const angle=Math.random()*Math.PI*2;
    const dist=r*.45+Math.random()*r*.35;
    const bx=x+Math.cos(angle)*dist, bz=z+Math.sin(angle)*dist;
    const bh=h*(.35+Math.random()*.4), br=r*(.3+Math.random()*.35);
    const bulge=cyl(0,br*2,bh,5,mm,[bx,bh/2-5,bz]);
    bulge.rotation.y=Math.random()*Math.PI;
  }
  // Snow cap
  const sm2=mat(new BABYLON.Color3(.88,.92,.98));
  cyl(0,r*.4,h*.3,segs,sm2,[x,h-8,z]);
  // Dark base rocks
  const rm=mat(new BABYLON.Color3(.18,.18,.2));
  for(let i=0;i<3;i++){
    const a=Math.random()*Math.PI*2, d=r*.7+Math.random()*r*.3;
    sph(.8+Math.random()*1.5,rm,[x+Math.cos(a)*d,.3,z+Math.sin(a)*d]);
  }
}
const mColors=[new BABYLON.Color3(.2,.26,.18),new BABYLON.Color3(.22,.28,.2),new BABYLON.Color3(.18,.24,.16)];
[[-340,-260,95,185],[-200,-360,78,148],[390,-240,92,172],[230,-340,74,138],
 [-350,250,88,162],[290,280,86,168],[0,-400,108,198],[0,380,98,178],
 [-380,0,82,158],[360,90,90,170],[-170,-170,52,88],[170,-170,50,84],
 [-170,170,54,90],[170,170,48,80],[-280,-280,68,125],[280,-280,65,118],
 [-280,280,70,128],[280,280,62,112]
].forEach(([x,z,r,h])=>mountain(x,z,r,h,mColors[Math.floor(Math.random()*3)]));

// ── RIVER ────────────────────────────────────
const rvr=BABYLON.MeshBuilder.CreateGround("rv",{width:22,height:320},scene);
rvr.material=mat(new BABYLON.Color3(.1,.36,.68),{a:.82}); rvr.position=new BABYLON.Vector3(112,.14,0);

// ── 4 TYPES OF TREES ─────────────────────────
setSt("Planting forest...");

// TYPE 1: Pine/Conifer — stacked cones
function pineCone(x,z,h=10){
  const tk=mat(new BABYLON.Color3(.2,.12,.06));
  cyl(.25,.6,h*.45,7,tk,[x,h*.22,z]);
  const lm=mat(new BABYLON.Color3(.06+Math.random()*.08,.22+Math.random()*.14,.05+Math.random()*.06));
  for(let i=0;i<4;i++){const ly=h*(.38+i*.16),lr=h*(.27-i*.05);cyl(.15,lr*2.2,h*.34,8,lm,[x,ly,z]);}
}

// TYPE 2: Cherry Blossom — fluffy pink clouds
function cherry(x,z,h=8){
  const tk=mat(new BABYLON.Color3(.28,.15,.07));
  cyl(.2,.5,h*.5,7,tk,[x,h*.25,z]);
  const bm=mat(new BABYLON.Color3(.86+Math.random()*.1,.6+Math.random()*.12,.68+Math.random()*.12));
  for(let i=0;i<5;i++){
    const bx=x+(Math.random()-.5)*h*.4, bz=z+(Math.random()-.5)*h*.4, by=h*(.55+Math.random()*.22);
    const blob=sph(h*(.18+Math.random()*.1),bm,[bx,by,bz]);
    blob.scaling=new BABYLON.Vector3(1+Math.random()*.3,.8+Math.random()*.25,1+Math.random()*.3);
  }
}

// TYPE 3: Oak/Round canopy
function oak(x,z,h=9){
  const tk=mat(new BABYLON.Color3(.22,.13,.07));
  cyl(.3,.7,h*.55,8,tk,[x,h*.27,z]);
  const lm=mat(new BABYLON.Color3(.12+Math.random()*.1,.3+Math.random()*.18,.08+Math.random()*.08));
  const main=sph(h*.42,lm,[x,h*.75,z]);
  main.scaling=new BABYLON.Vector3(1.1,.9,1.1);
  // Secondary blobs
  for(let i=0;i<3;i++){
    const b=sph(h*.28,lm,[x+(Math.random()-.5)*h*.35,h*(.68+Math.random()*.15),z+(Math.random()-.5)*h*.35]);
  }
}

// TYPE 4: Bamboo — tall thin stalks
function bamboo(x,z,h=12){
  const bm=mat(new BABYLON.Color3(.38+Math.random()*.1,.52+Math.random()*.12,.22+Math.random()*.08));
  const count=3+Math.floor(Math.random()*4);
  for(let i=0;i<count;i++){
    const bx=x+(Math.random()-.5)*1.5, bz=z+(Math.random()-.5)*1.5;
    const bh=h*(.7+Math.random()*.4);
    cyl(.06,.1,bh,6,bm,[bx,bh/2,bz]);
    // Leaf tufts at top
    const lm=mat(new BABYLON.Color3(.32,.48,.18));
    for(let j=0;j<3;j++){
      const lx=bx+(Math.random()-.5)*1.2, lz=bz+(Math.random()-.5)*1.2;
      const leaf=box(.8,.08,1.8,lm,[lx,bh-.5,lz],Math.random()*Math.PI);
    }
  }
}

// Plant forest in rings
let ti=0;
const treeFns=[pineCone,cherry,oak,bamboo];
for(let ring=0;ring<4;ring++){
  const r=115+ring*32, cnt=32+ring*16;
  for(let i=0;i<cnt;i++){
    const a=(i/cnt)*Math.PI*2+ring*.5, jit=(Math.random()-.5)*26;
    const x=Math.cos(a)*r+jit, z=Math.sin(a)*r+jit, h=8+Math.random()*11;
    // Weighted selection — more pine and cherry
    const weights=[0,0,0,1,1,2,2,3]; // pine=0,cherry=1,oak=2,bamboo=3
    const fn=treeFns[weights[Math.floor(Math.random()*weights.length)]||0];
    fn(x,z,h); ti++;
  }
}
// Courtyard accent trees
[[-52,0],[52,0],[0,-52],[0,52],[-42,42],[42,42],[-42,-42],[42,-42],
 [-55,24],[-55,-24],[55,24],[55,-24],[24,-55],[-24,-55],[24,55],[-24,55],
 [-28,28],[28,28],[-28,-28],[28,-28]
].forEach(([x,z])=>{
  const fn=[cherry,bamboo,cherry,oak][Math.floor(Math.random()*4)];
  fn(x,z,5+Math.random()*3);
});

// ── ROCKS ────────────────────────────────────
const rkm=pbr(new BABYLON.Color3(.38,.38,.4),{r:.92,m:.08});
[[-62,-42,1.5],[-61,-41,.9],[62,-42,1.3],[63,-41,.75],[-62,42,1.2],[62,42,1.4],
 [-38,62,1.0],[38,62,.9],[-38,-62,1.1],[38,-62,.95],[70,6,1.3],[-70,6,1.0],
 [-15,72,.8],[15,72,.7],[-72,15,.9],[72,-15,1.1]
].forEach(([x,z,s],i)=>{
  const r=BABYLON.MeshBuilder.CreateSphere("r"+i,{diameter:s*3.5,segments:4},scene);
  r.material=rkm; r.position=new BABYLON.Vector3(x,s*.8,z);
  r.scaling=new BABYLON.Vector3(1+Math.random()*.55,.48+Math.random()*.3,1+Math.random()*.45);
  r.rotation.y=Math.random()*Math.PI*2;
  shadows.addShadowCaster(r); r.receiveShadows=true;
});

// ── TORII GATES ──────────────────────────────
const trM=pbr(new BABYLON.Color3(.8,.1,.06),{r:.65,m:.1});
const glM=pbr(new BABYLON.Color3(.9,.76,.28),{r:.4,m:.5,e:new BABYLON.Color3(.15,.1,0),ei:.3});
function torii(x,z,ry=0){
  const g=new BABYLON.TransformNode("tg"+x,scene);
  g.position=new BABYLON.Vector3(x,0,z); g.rotation.y=ry;
  for(let s of[-1,1]){
    const p=cyl(.3,.42,8,10,trM,[s*2.6,4,0]);p.parent=g;
    const b=box(.78,.5,.78,mat(new BABYLON.Color3(.3,.3,.32)),[s*2.6,-.02,0]);b.parent=g;
  }
  const b1=box(6.8,.44,.44,trM,[0,4.8,0]);b1.parent=g;
  for(let s of[-1,1]){const c=box(.46,.44,.62,trM,[s*3.6,5.02,0]);c.rotation.z=s*-.2;c.parent=g;}
  const b2=box(6.0,.36,.36,trM,[0,4.28,0]);b2.parent=g;
  const pl=box(2.2,.48,.12,glM,[0,4.66,0]);pl.parent=g;
}
torii(0,98); torii(0,82); torii(-96,0,Math.PI/2); torii(96,0,Math.PI/2); torii(0,-92,Math.PI);

// ── FENCE ────────────────────────────────────

function pagodaRoof(x,y,z,w,d,col,ry=0,tiers=2){
  const rm=pbr(col,{r:.8});
  for(let i=0;i<tiers;i++){
    const sc=1-i*.28, ty=y+i*2.4;
    const cone=cyl(0,Math.max(w,d)*(.8-i*.1)*sc,2.4,4,rm,[x,ty,z]);
    cone.rotation.y=Math.PI/4+(ry||0);
    box((w+1.8)*sc,.2,(d+1.8)*sc,rm,[x,ty-1.2,z]);
    // Gold corner tips
    const gm2=pbr(new BABYLON.Color3(.9,.76,.28),{m:.6,r:.3,e:new BABYLON.Color3(.12,.1,0),ei:.2});
    for(let [cx,cz] of[[-1,-1],[1,-1],[-1,1],[1,1]]){
      const tip=cyl(0,.1,.45,4,gm2,[x+cx*(w+.8)*sc*.5,ty-1.05,z+cz*(d+.8)*sc*.5]);
      tip.rotation.z=cx*.28; tip.rotation.x=cz*.28;
    }
  }
  // Finial
  const gm3=pbr(new BABYLON.Color3(.9,.76,.28),{m:.6,r:.3});
  cyl(.03,.12,1.1,6,gm3,[x,y+tiers*2.4-.1,z]);

}

function woodPanel(x,y,z,w,h,col,n=4,fz=0){

  for(let i=0;i<n;i++){

  const bm2=pbr(new BABYLON.Color3(.22,.12,.05),{r:.9});
  for(let hy of[-.4,.0,.4].map(v=>y+v*(h/2))){box(w,.1,.1,bm2,[x,hy,z+fz]);}
}

  doorFrame(x,2.05,z+4.57,1.9,3.0);
  for(let i=0;i<3;i++){box(9-i*.4,.28,.62,pbr(new BABYLON.Color3(.5,.5,.58),{r:.9}),[x,i*.28-.18,z+4.72+i*.3]);}
  pagodaRoof(x,6.8,z,10,9,new BABYLON.Color3(.42,.18,.72),0,1);
  addTrigger({id:'forge',x,z,title:'THE FORGE',sub:'Custom Trait Builder',icon:'🎨',desc:'Gear up your ants for battle. Add custom overlays — weapons, armor, accessories — to your Battle for the Colony ants. Free to use for all holders.',actions:[{label:'Open Forge',href:'https://builder.rebelants.io',t:true},{label:'View Site',href:'https://rebelants.io',g:true}]});
})();

// ── WALKABLE CHARACTER ───────────────────────
setSt("Loading character...");
let charMesh=null, charAnims={}, isMoving=false;
let moveForward=false, moveBackward=false, turnLeft=false, turnRight=false;
BABYLON.SceneLoader.ImportMeshAsync("", "/assets/character/", "ant_player.glb", scene)
.then(r => {

  // Create our own clean player root
  const playerRoot = new BABYLON.TransformNode("playerRoot", scene);
  playerRoot.position = new BABYLON.Vector3(0, 3.6, 20);
  playerRoot.rotation = new BABYLON.Vector3(0, Math.PI, 0);
  playerRoot.scaling = new BABYLON.Vector3(1, 1, 1);

  // Parent all imported meshes under our player root
  r.meshes.forEach(m => {
    if (m !== playerRoot) {
      m.parent = playerRoot;
    }
    shadows.addShadowCaster(m);
    m.receiveShadows = true;
  });

  // Use playerRoot as the thing we move and rotate
  charMesh = playerRoot;

  // Handle animations (if they exist)
  r.animationGroups.forEach(ag => {
    charAnims[ag.name.toLowerCase()] = ag;
    ag.stop();
  });

  // Try to play idle animation automatically
  if (charAnims["idle"]) {
    charAnims["idle"].play(true);
  }

  console.log("Character loaded:", r);
  setSt("Character ready!");

})
.catch(err => {
  console.error("Character failed to load:", err);
  setSt("Character failed to load");
});

// ── INTERACTIONS ─────────────────────────────
const tooltip=document.getElementById('tt');
const panel=document.getElementById('panel');
const pickMeshes=()=>BUILDINGS.map(b=>b.mesh);

scene.onPointerObservable.add(evt=>{
  if(evt.type!==BABYLON.PointerEventTypes.POINTERPICK||panel.classList.contains('on'))return;
  const hit=evt.pickInfo;
  if(!hit||!hit.hit)return;
  const b=BUILDINGS.find(b=>b.mesh===hit.pickedMesh);
  if(b)openPanel(b);
});

scene.onPointerObservable.add(evt=>{
  if(evt.type!==BABYLON.PointerEventTypes.POINTERMOVE||walkMode)return;
  const hit=scene.pick(scene.pointerX,scene.pointerY,m=>BUILDINGS.some(b=>b.mesh===m));
  if(hit&&hit.hit){
    const b=BUILDINGS.find(b=>b.mesh===hit.pickedMesh);
    if(b){document.getElementById('tth').textContent=b.title;document.getElementById('ttp').textContent=b.sub;tooltip.classList.add('on');canvas.style.cursor='pointer';return;}
  }
  tooltip.classList.remove('on');canvas.style.cursor='default';
});

document.getElementById('pc').addEventListener('click',()=>panel.classList.remove('on'));

function openPanel(b){
  document.getElementById('picon').textContent=b.icon;
  document.getElementById('ph2').textContent=b.title;
  document.getElementById('psub').textContent=b.sub;
  document.getElementById('pdesc').textContent=b.desc;
  const acts=document.getElementById('pact');acts.innerHTML='';
  b.actions.forEach(a=>{
    const btn=document.createElement('a');
    btn.className='pb'+(a.g?' g':a.t?' t':a.r?' r':'');
    btn.textContent=a.label;btn.href=a.href;btn.target='_blank';btn.rel='noopener';
    acts.appendChild(btn);
  });
  panel.classList.add('on');
}

// ── WALK MODE ────────────────────────────────
function toggleWalk(){
  walkMode = !walkMode;
  const wb = document.getElementById('wb');
  const xh = document.getElementById('xhair');

  if (walkMode) {
    if (charMesh) {
           walk.position = new BABYLON.Vector3(
        charMesh.position.x,
        charMesh.position.y + 2.2,
        charMesh.position.z - 4
      );
      walk.setTarget(new BABYLON.Vector3(
        charMesh.position.x,
        charMesh.position.y + 1.8,
        charMesh.position.z + 2
      ));
    }

    scene.activeCamera = walk;
       walk.detachControl();
    orbit.detachControl();

    wb.textContent = '🌐  EXIT WALK MODE';
    wb.classList.add('on');
    xh.classList.remove('on');
  } else {
    scene.activeCamera = orbit;
    orbit.attachControl(canvas, true);
    walk.detachControl();

    wb.textContent = '⚔️  ENTER VILLAGE';
    wb.classList.remove('on');
    xh.classList.remove('on');
  }
}
document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();

  if (key === 'escape' && walkMode) toggleWalk();

  if (key === 'w') moveForward = true;
  if (key === 's') moveBackward = true;
  if (key === 'a') turnLeft = true;
  if (key === 'd') turnRight = true;
});

document.addEventListener('keyup', e => {
  const key = e.key.toLowerCase();

  if (key === 'w') moveForward = false;
  if (key === 's') moveBackward = false;
  if (key === 'a') turnLeft = false;
  if (key === 'd') turnRight = false;
});

window.addEventListener('resize',()=>engine.resize());

// ── RENDER LOOP ──────────────────────────────
let t=0;
engine.runRenderLoop(()=>{
  t += engine.getDeltaTime() * .001;

  fireLights.forEach(fl => {
    fl.intensity = fl._b + Math.sin(t * 9.2 + fl.position.x * 3) * .65 + Math.sin(t * 15.1 + fl.position.z) * .32;
  });

  lanLights.forEach(ll => {
    if (ll._b) ll.intensity = ll._b + Math.sin(t * 1.9 + ll.position.x * .3) * .1;
  });

    if (walkMode && charMesh) {
    const dt = engine.getDeltaTime() / 1000;
    const moveSpeed = 5.5 * dt;
    const turnSpeed = 4.8 * dt;

    if (turnLeft) charMesh.rotation.y -= turnSpeed;
    if (turnRight) charMesh.rotation.y += turnSpeed;

    const forward = new BABYLON.Vector3(
      Math.sin(charMesh.rotation.y),
      0,
      Math.cos(charMesh.rotation.y)
    );

    if (moveForward) {
      charMesh.position.addInPlace(forward.scale(moveSpeed));
    }

    if (moveBackward) {
      charMesh.position.addInPlace(forward.scale(-moveSpeed * 0.7));
    }

    const desiredCameraPosition = new BABYLON.Vector3(
      charMesh.position.x,
      charMesh.position.y + 1.6,
      charMesh.position.z - 5
    );

    walk.position = BABYLON.Vector3.Lerp(
      walk.position,
      desiredCameraPosition,
      0.12
    );

    walk.setTarget(new BABYLON.Vector3(
      charMesh.position.x,
      charMesh.position.y + 0.9,
      charMesh.position.z + 3
    ));
  }
  scene.render();
});

    m.receiveShadows = true;

  dojoRoot.position = new BABYLON.Vector3(0, 0, -80);
  dojoRoot.scaling = new BABYLON.Vector3(1, 1, 1);
  dojoRoot.rotation = new BABYLON.Vector3(0, Math.PI, 0);

  console.log("Dojo loaded", r);

})
.catch(err => {
  console.error("Dojo failed to load", err);
});

// ── LOADING FADE ─────────────────────────────
setTimeout(()=>{
  const ld=document.getElementById('ld');
  ld.style.opacity='0';
  setTimeout(()=>ld.style.display='none',900);
},1800);
</script>
