<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rebel Ants — The Hidden Village</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Cinzel', serif;}

/* ── BABYLON BACKGROUND ── */
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}

/* ── VIGNETTE OVERLAY ── */
#vignette{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;
  background:radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.6) 100%);
  pointer-events:none;
}

/* ── SCANLINE OVERLAY ── */
#scanlines{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);
  pointer-events:none;
}

/* ── MAIN UI ── */
#ui{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:32px;
}

/* ── UI BACKDROP ── */
#ui-backdrop{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:9;
  background:linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.3) 40%, rgba(0,0,0,0.6) 70%, rgba(0,0,0,0.75) 100%);
  pointer-events:none;
}

/* ── LOGO ── */
#logo-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
#logo{width:320px;max-width:80vw;filter:drop-shadow(0 0 30px rgba(255,180,50,0.4));
  animation:float 4s ease-in-out infinite;}
#logo-placeholder{
  color:#c8922a;font-size:42px;font-weight:900;letter-spacing:8px;text-transform:uppercase;font-family:'Cinzel Decorative',serif;
  text-shadow:0 0 40px rgba(200,146,42,0.8),0 2px 4px rgba(0,0,0,0.9);
  display:none;
}
#logo-sub{color:#8a7a5a;font-size:11px;letter-spacing:8px;text-transform:uppercase;font-family:'Cinzel',serif;
  text-shadow:0 1px 3px rgba(0,0,0,0.9);}

@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

/* ── CHARACTER SELECT ── */
#char-section{display:flex;flex-direction:column;align-items:center;gap:16px;}
#char-label{color:#c8b68a;font-size:10px;letter-spacing:5px;text-transform:uppercase;font-family:'Cinzel',serif;text-shadow:0 1px 6px rgba(0,0,0,1);}
#char-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center;max-width:520px;max-height:220px;overflow-y:auto;padding:4px;}
#char-row::-webkit-scrollbar{width:4px;}
#char-row::-webkit-scrollbar-thumb{background:rgba(200,146,42,0.5);border-radius:2px;}
#char-status{color:#c8b68a;font-size:10px;letter-spacing:3px;font-family:'Cinzel',serif;text-align:center;min-height:20px;text-shadow:0 1px 4px rgba(0,0,0,1);}

.ant-card{
  width:90px;height:90px;border-radius:8px;cursor:pointer;
  border:2px solid rgba(200,146,42,0.3);overflow:hidden;
  background:rgba(0,0,0,0.6);transition:all 0.2s ease;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.ant-card img{width:100%;height:100%;object-fit:cover;}
.ant-card:hover{border-color:rgba(200,146,42,0.9);transform:scale(1.08);
  box-shadow:0 0 20px rgba(200,146,42,0.4);}
.ant-card.selected{border-color:#c8922a;box-shadow:0 0 25px rgba(200,146,42,0.6);}
.ant-card.locked{opacity:0.35;cursor:not-allowed;}
.ant-card.locked:hover{transform:none;border-color:rgba(200,146,42,0.3);}
.lock-icon{position:absolute;font-size:22px;color:rgba(255,255,255,0.5);}
.ant-name{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,0.75);color:#c8922a;font-size:8px;
  letter-spacing:1px;text-align:center;padding:2px 3px;
  text-transform:uppercase;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;line-height:1.2;
  opacity:0;transition:opacity 0.2s ease;
}
.ant-card:hover .ant-name{ opacity:1; }
.ant-card.selected .ant-name{ opacity:1; }

/* ── BUTTONS ── */
#btn-row{display:flex;gap:16px;align-items:center;}

.btn{
  padding:14px 36px;font-size:11px;letter-spacing:4px;text-transform:uppercase;
  border:none;cursor:pointer;transition:all 0.2s ease;font-family:'Cinzel',serif;
}
#btn-enter{
  background:linear-gradient(135deg,#c8922a,#8a5e1a);color:#fff;
  box-shadow:0 4px 20px rgba(200,146,42,0.6), 0 0 0 1px rgba(200,146,42,0.3);
}
#btn-enter:hover{box-shadow:0 6px 30px rgba(200,146,42,0.7);transform:translateY(-2px);}
#btn-enter:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

#btn-forge{
  background:transparent;
  color:#5ecfca;
  border:1px solid rgba(94,207,202,0.5);
  box-shadow:0 0 0 1px rgba(94,207,202,0.08);
}
#btn-forge:hover{
  background:rgba(94,207,202,0.12);
  border-color:rgba(94,207,202,0.85);
  box-shadow:0 6px 24px rgba(94,207,202,0.22);
  transform:translateY(-2px);
}
#btn-forge:disabled{
  opacity:0.4;
  cursor:not-allowed;
  transform:none;
}

#btn-wallet{
  background:transparent;color:#8a7a5a;
  border:1px solid rgba(138,122,90,0.4);font-size:11px;
}
#btn-wallet:hover{color:#c8922a;border-color:rgba(200,146,42,0.6);}
#btn-wallet.connected{color:#6abf6a;border-color:rgba(106,191,106,0.4);}

/* ── NEWS TICKER ── */
#ticker{
  position:fixed;bottom:0;left:0;right:0;z-index:11;
  background:rgba(0,0,0,0.8);border-top:1px solid rgba(200,146,42,0.2);
  padding:10px 0;overflow:hidden;
}
#ticker-inner{
  display:inline-block;white-space:nowrap;
  animation:ticker 30s linear infinite;
  color:#8a7a5a;font-size:10px;letter-spacing:3px;font-family:'Cinzel',serif;
}
@keyframes ticker{0%{transform:translateX(100vw);}100%{transform:translateX(-100%);}}

/* ── LOADING SCREEN ── */
#loading{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;
  background:#000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;
  transition:opacity 1s ease;
}
#loading.hidden{opacity:0;pointer-events:none;}
#loading-text{color:#8a7a5a;font-size:10px;letter-spacing:5px;text-transform:uppercase;font-family:'Cinzel',serif;}
#loading-bar-wrap{width:200px;height:2px;background:rgba(255,255,255,0.1);}
#loading-bar{height:100%;width:0%;background:#c8922a;transition:width 0.3s ease;}

/* ── ENTER TRANSITION ── */
#blackout{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:99;
  background:#000;opacity:0;pointer-events:none;transition:opacity 0.8s ease;
}
#blackout.active{opacity:1;}

/* ── VERSION ── */
#version{
  position:fixed;bottom:36px;right:16px;z-index:12;
  color:rgba(138,122,90,0.4);font-size:10px;letter-spacing:2px;
}

/* ── SECRET ADMIN ENTRANCE ── */
#admin-ant{
  position:fixed;
  bottom:34px;
  left:16px;
  z-index:12;
  background:transparent;
  border:none;
  color:rgba(200,146,42,0.38);
  font-size:16px;
  cursor:pointer;
  opacity:.55;
  transition:all .2s ease;
  filter:drop-shadow(0 0 6px rgba(200,146,42,.15));
}
#admin-ant:hover{
  opacity:1;
  color:#c8922a;
  transform:translateY(-2px) scale(1.08);
  filter:drop-shadow(0 0 10px rgba(200,146,42,.45));
}

#admin-modal-backdrop{
  position:fixed;
  inset:0;
  z-index:120;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(8px);
}
#admin-modal-backdrop.open{
  display:flex;
}
#admin-modal{
  width:min(360px, calc(100vw - 32px));
  background:rgba(5,8,18,.96);
  border:1px solid rgba(200,146,42,.45);
  box-shadow:0 0 35px rgba(0,0,0,.7), 0 0 24px rgba(200,146,42,.12);
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
#admin-modal-title{
  color:#c8922a;
  font-family:'Cinzel Decorative',serif;
  font-size:15px;
  letter-spacing:3px;
  text-align:center;
}
#admin-modal-sub{
  color:#8a7a5a;
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
  text-align:center;
}
#admin-password{
  width:100%;
  padding:12px 13px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(200,146,42,.25);
  color:#f3e6bf;
  font-family:'Cinzel',serif;
  font-size:13px;
  outline:none;
}
#admin-password:focus{
  border-color:rgba(200,146,42,.75);
  box-shadow:0 0 0 1px rgba(200,146,42,.25);
}
#admin-modal-actions{
  display:flex;
  gap:10px;
}
.admin-modal-btn{
  flex:1;
  padding:11px 14px;
  font-size:10px;
  letter-spacing:3px;
  text-transform:uppercase;
  border:none;
  cursor:pointer;
  transition:all .2s ease;
  font-family:'Cinzel',serif;
}
#admin-login-btn{
  background:linear-gradient(135deg,#c8922a,#8a5e1a);
  color:#fff;
}
#admin-login-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 5px 18px rgba(200,146,42,.35);
}
#admin-cancel-btn{
  background:transparent;
  color:#8a7a5a;
  border:1px solid rgba(138,122,90,.35);
}
#admin-cancel-btn:hover{
  color:#c8922a;
  border-color:rgba(200,146,42,.6);
}
#admin-login-status{
  min-height:16px;
  color:#8a7a5a;
  font-size:10px;
  letter-spacing:2px;
  text-align:center;
}
#admin-login-status.error{
  color:#ff8b8b;
}
#admin-login-status.success{
  color:#7cffb2;
}
.ant-card-marquee {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 14px;
  background: rgba(0,0,0,0.78);
  color: #c8922a;
  font-size: 8px;
  line-height: 14px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  white-space: nowrap;
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.2s ease;
}

.ant-card:hover .ant-card-marquee,
.ant-card.selected .ant-card-marquee {
  opacity: 1;
}

.ant-card-marquee.forge-ready {
  color: #5ecfca;
}

.ant-card-marquee span {
  display: inline-block;
  min-width: max-content;
  padding-left: 6px;
  padding-right: 24px;
  animation: antCardTextScroll 5.5s ease-in-out infinite alternate;
}

@keyframes antCardTextScroll {
  0% {
    transform: translateX(0);
  }

  100% {
    transform: translateX(-55%);
  }
}
</style>
</head>
<body>

<!-- Background flyover video -->
<video id="bgVideo" autoplay loop muted playsinline
  style="position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:0;transition:opacity 2s ease;">
  <source src="assets/lobby/flyover.mp4" type="video/mp4">
</video>
<div id="vignette"></div>
<div id="ui-backdrop"></div>
<div id="scanlines"></div>

<!-- Loading screen -->
<div id="loading">
  <div id="loading-text">Initializing Village...</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<!-- Blackout for enter transition -->
<div id="blackout"></div>

<!-- Main UI -->
<div id="ui" style="opacity:0;transition:opacity 1.5s ease;">

  <!-- Logo -->
  <div id="logo-wrap">
    <img id="logo" src="assets/lobby/logo.png" alt="Rebel Ants"
      onerror="this.style.display='none';document.getElementById('logo-placeholder').style.display='block'"/>
    <div id="logo-placeholder">REBEL ANTS</div>
    <div id="logo-sub">The Hidden Village</div>
  </div>

  <!-- Character Select -->
  <div id="char-section">
    <div id="char-label">Select Your Rebel</div>
    <div id="char-row"></div>
    <div id="char-status"></div>
  </div>

 <!-- Buttons -->
  <div id="btn-row">
    <button class="btn" id="btn-wallet" onclick="connectWallet()">Connect Wallet</button>
    <button class="btn" id="btn-forge" onclick="enterForge()">Forge 3D Character</button>
    <button class="btn" id="btn-enter" onclick="enterVillage()">Enter Village</button>
  </div>

</div>

<!-- News ticker -->
<div id="ticker">
  <span id="ticker-inner">
    ✦ REBEL ANTS — THE HIDDEN VILLAGE &nbsp;&nbsp;&nbsp;
    ✦ Season 1 Now Live &nbsp;&nbsp;&nbsp;
    ✦ New dojos coming soon &nbsp;&nbsp;&nbsp;
    ✦ The Foundry — AI character generation coming &nbsp;&nbsp;&nbsp;
    ✦ Hold your ant. Enter the village. &nbsp;&nbsp;&nbsp;
  </span>
</div>

<div id="version">v0.1 DEV</div>

<button id="admin-ant" type="button" onclick="openAdminModal()" aria-label="Admin access">🐜</button>

<div id="admin-modal-backdrop" onclick="closeAdminModalFromBackdrop(event)">
  <div id="admin-modal">
    <div id="admin-modal-title">ADMIN ACCESS</div>
    <div id="admin-modal-sub">Rebel Ants Command Gate</div>
    <input id="admin-password" type="password" placeholder="Enter password" autocomplete="current-password">
    <div id="admin-modal-actions">
      <button class="admin-modal-btn" id="admin-cancel-btn" type="button" onclick="closeAdminModal()">Cancel</button>
      <button class="admin-modal-btn" id="admin-login-btn" type="button" onclick="submitAdminLogin()">Enter</button>
    </div>
    <div id="admin-login-status"></div>
  </div>
</div>

<!-- Video background — no Babylon needed for lobby -->

<script>
// ── NFT CONFIG ──
const NFT_CONTRACT = '0x96C1469c1C76E3Bb0e37c23a830d0Eea6BCf9221';
let selectedAnt = null;
let ownedRebels = [];

function setStatus(msg) {
  const el = document.getElementById('char-status');
  if (el) el.textContent = msg;
}

function normalizeRebelTraits(traits) {
  const traitMap = {};

  (traits || []).forEach(t => {
    if (t && t.trait_type) {
      traitMap[t.trait_type] = t.value || null;
    }
  });

  return traitMap;
}

async function loadSelectedRebelMetadata(rebel) {
  if (!rebel || !rebel.tokenId) return rebel;

  try {
    const CONTRACT = '0x96C1469c1C76E3Bb0e37c23a830d0Eea6BCf9221';
    const API_KEY = '9c35627b295643e4aeb495a43d102928';
    const url = `https://api.opensea.io/api/v2/metadata/ethereum/${CONTRACT}/${rebel.tokenId}`;

    const r = await fetch(url, {
      headers: {
        accept: 'application/json',
        'x-api-key': API_KEY
      }
    });

    if (!r.ok) throw new Error('metadata status ' + r.status);

    const metadata = await r.json();
    const traits = normalizeRebelTraits(metadata.traits);

    return {
      ...rebel,
      traits,
      gangName: traits['Gang Names'] || null,
      metadataLoaded: true
    };
  } catch(e) {
    console.warn('Selected Rebel metadata load failed:', e);
    return {
      ...rebel,
      traits: rebel.traits || {},
      gangName: rebel.gangName || null,
      metadataLoaded: false
    };
  }
}

async function loadActiveForgeCharacterForRebel(rebel) {
  if (!rebel) return null;

  const collectionKey = rebel.collectionKey || 'battle_for_colony';
  const tokenId = rebel.tokenId || '';
  const rebelId = rebel.rebelId || rebel.id || '';

  if (!tokenId && !rebelId) return null;

  const params = new URLSearchParams({ collectionKey });

  if (tokenId) {
    params.set('tokenId', tokenId);
  } else if (rebelId) {
    params.set('rebelId', rebelId);
  }

  try {
    const response = await fetch(`/api/forge-active-character-get?${params.toString()}`);
    const data = await response.json();

    if (!response.ok || !data.ok || !data.hasActiveCharacter) {
      return null;
    }

    return data.activeCharacter || null;
  } catch(e) {
    console.warn('Could not load active Forge character:', e);
    return null;
  }
}

function forgeCharacterMatchesRebel(activeForgeCharacter, rebel) {
  if (!activeForgeCharacter || !rebel) return false;

  const activeTokenId = activeForgeCharacter.tokenId ? String(activeForgeCharacter.tokenId) : '';
  const rebelTokenId = rebel.tokenId ? String(rebel.tokenId) : '';

  const activeRebelId = activeForgeCharacter.rebelId ? String(activeForgeCharacter.rebelId) : '';
  const rebelRebelId = rebel.rebelId ? String(rebel.rebelId) : '';
  const rebelId = rebel.id ? String(rebel.id) : '';

  if (activeTokenId && rebelTokenId && activeTokenId === rebelTokenId) {
    return true;
  }

  if (activeRebelId && rebelRebelId && activeRebelId === rebelRebelId) {
    return true;
  }

  if (activeRebelId && rebelId && activeRebelId === rebelId) {
    return true;
  }

  return false;
}

async function attachActiveForgeCharacter(rebel) {
  const activeForgeCharacter = await loadActiveForgeCharacterForRebel(rebel);

  if (!activeForgeCharacter) {
    return rebel;
  }

  if (!forgeCharacterMatchesRebel(activeForgeCharacter, rebel)) {
    return {
      ...rebel,
      activeForgeCharacter: null,
      activeGlbUrl: null,
      characterSource: 'starter_bundle'
    };
  }

  return {
    ...rebel,
    activeForgeCharacter,
    activeGlbUrl: activeForgeCharacter.activeGlbUrl || null,
    characterSource: 'forge_glb'
  };
}
 
async function selectAnt(id) {
  selectedAnt = id;
  document.querySelectorAll('.ant-card').forEach(c => c.classList.remove('selected'));

  const card = document.getElementById('card_' + id);
  if (card) card.classList.add('selected');

  const rebel = ownedRebels.find(r => r.id === id);
  if (!rebel) return;

    setStatus('Loading Rebel details...');
  const enrichedRebel = await loadSelectedRebelMetadata(rebel);
  const forgeReadyRebel = await attachActiveForgeCharacter(enrichedRebel);

  const rebelIndex = ownedRebels.findIndex(r => r.id === id);
  if (rebelIndex >= 0) {
    ownedRebels[rebelIndex] = forgeReadyRebel;
  }

  const charRow = document.getElementById('char-row');
  if (charRow) {
    charRow.innerHTML = '';
    ownedRebels.forEach(buildCard);
  }

  try {
    localStorage.setItem('selectedRebel', JSON.stringify(forgeReadyRebel));
  } catch(e) {}

  setStatus(
    ownedRebels.length +
    ' Rebel' +
    (ownedRebels.length > 1 ? 's' : '') +
    ' found' +
    (forgeReadyRebel.gangName ? ' — ' + forgeReadyRebel.gangName : '') +
    (forgeReadyRebel.activeForgeCharacter?.activeGlbUrl ? ' — 3D Forge Character Ready' : '')
  );
}

function buildCard(rebel) {
  const charRow = document.getElementById('char-row');
  const card = document.createElement('div');
  card.className = 'ant-card' + (rebel.id === selectedAnt ? ' selected' : '');
  card.id = 'card_' + rebel.id;
  card.onclick = () => selectAnt(rebel.id);

  const hasForgeCharacter = Boolean(rebel.activeForgeCharacter?.activeGlbUrl || rebel.activeGlbUrl);
  const labelText = hasForgeCharacter ? '3D Forge Character Ready ✓' : rebel.name;

  const cardLabel = `
    <div class="ant-card-marquee ${hasForgeCharacter ? 'forge-ready' : ''}">
      <span>${labelText}</span>
    </div>
  `;

  card.innerHTML = `<img src="${rebel.image}" onerror="this.src='assets/lobby/ant_1.JPG'"/>
    ${cardLabel}`;
  charRow.appendChild(card);
}

async function showDefaultCard() {
  const charRow = document.getElementById('char-row');
  charRow.innerHTML = '';

  ownedRebels = [{
    id: 'ant_1',
    name: 'Rebel #001',
    image: 'assets/lobby/ant_1.JPG',
    collectionKey: 'battle_for_colony'
  }];

  selectedAnt = 'ant_1';

  const defaultRebel = await attachActiveForgeCharacter(ownedRebels[0]);
  ownedRebels[0] = defaultRebel;

  buildCard(defaultRebel);

  try {
    localStorage.setItem('selectedRebel', JSON.stringify(defaultRebel));
  } catch(e) {}
}

async function loadNFTs(walletAddress) {
  const charRow = document.getElementById('char-row');
  charRow.innerHTML = '';
  setStatus('Loading your Rebels...');

  try {
    // Query by collection slug + wallet — gets ALL owned ants, paginated
    const COLLECTION = 'rebel-ants-battle-for-the-colony';
    const API_KEY = '9c35627b295643e4aeb495a43d102928';
    let allRebels = [];
    let next = null;
    let pages = 0;

    do {
      const url = `https://api.opensea.io/api/v2/chain/ethereum/account/${walletAddress}/nfts?collection=${COLLECTION}&limit=50${next ? '&next=' + next : ''}`;
      const r = await fetch(url, { headers: { 'accept': 'application/json', 'x-api-key': API_KEY } });

      if (!r.ok) throw new Error('status ' + r.status);

      const data = await r.json();
      allRebels = allRebels.concat(data.nfts || []);
      next = data.next || null;
      pages++;

      setStatus('Loading... ' + allRebels.length + ' found');
    } while (next && pages < 10); // max 500 ants

    if (allRebels.length === 0) {
      setStatus('No Rebels found — showing default');
      showDefaultCard();
      return;
    }

    const mappedRebels = allRebels.map(n => ({
      id: 'rebel_' + n.identifier,
      rebelId: 'rebel_' + n.identifier,
      name: n.name || ('Rebel #' + n.identifier),
      image: n.image_url || 'assets/lobby/ant_1.JPG',
      tokenId: n.identifier,
      collectionKey: 'battle_for_colony'
    }));

    setStatus('Checking Forge characters...');

    ownedRebels = await Promise.all(
      mappedRebels.map((rebel) => attachActiveForgeCharacter(rebel))
    );

    const forgedReadyRebel = ownedRebels.find((rebel) => {
      return Boolean(rebel.activeForgeCharacter?.activeGlbUrl || rebel.activeGlbUrl);
    });

    selectedAnt = forgedReadyRebel ? forgedReadyRebel.id : ownedRebels[0].id;

    charRow.innerHTML = '';
    ownedRebels.forEach(r => buildCard(r));

    await selectAnt(selectedAnt);

    setStatus(
      ownedRebels.length +
      ' Rebel' +
      (ownedRebels.length > 1 ? 's' : '') +
      ' found' +
      (forgedReadyRebel ? ' — 3D Forge Character Ready' : '')
    );

    document.getElementById('btn-enter').disabled = false;
  } catch(e) {
    console.warn('NFT load failed:', e);
    setStatus('Could not load — showing default');
    showDefaultCard();
  }
}

// Init default card on load
document.addEventListener('DOMContentLoaded', () => showDefaultCard());

// ── WALLET ──
let walletConnected = false;
async function connectWallet() {
  const btn = document.getElementById('btn-wallet');
  // Disconnect if already connected
  if (walletConnected) {
    walletConnected = false;
    btn.textContent = 'Connect Wallet';
    btn.classList.remove('connected');
    setStatus('');
    showDefaultCard();
    return;
  }
  if (typeof window.ethereum === 'undefined') {
    btn.textContent = 'No Wallet Found';
    return;
  }
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    walletConnected = true;
    const addr = accounts[0];
    btn.textContent = addr.slice(0,6) + '...' + addr.slice(-4);
    btn.classList.add('connected');
    btn.title = 'Click to disconnect';
    loadNFTs(addr);
  } catch(e) {
    btn.textContent = 'Rejected';
  }
}

// ── SECRET ADMIN ENTRANCE ──
function openAdminModal() {
  const backdrop = document.getElementById('admin-modal-backdrop');
  const input = document.getElementById('admin-password');
  const status = document.getElementById('admin-login-status');

  if (status) {
    status.textContent = '';
    status.className = '';
  }

  if (input) {
    input.value = '';
  }

  if (backdrop) {
    backdrop.classList.add('open');
  }

  setTimeout(() => {
    if (input) input.focus();
  }, 0);
}

function closeAdminModal() {
  const backdrop = document.getElementById('admin-modal-backdrop');
  const input = document.getElementById('admin-password');
  const status = document.getElementById('admin-login-status');

  if (backdrop) backdrop.classList.remove('open');
  if (input) input.value = '';
  if (status) {
    status.textContent = '';
    status.className = '';
  }
}

function closeAdminModalFromBackdrop(event) {
  if (event.target && event.target.id === 'admin-modal-backdrop') {
    closeAdminModal();
  }
}

async function submitAdminLogin() {
  const input = document.getElementById('admin-password');
  const status = document.getElementById('admin-login-status');
  const loginBtn = document.getElementById('admin-login-btn');
  const password = input ? input.value : '';

  if (!password) {
    if (status) {
      status.textContent = 'Enter password';
      status.className = 'error';
    }
    return;
  }

  if (loginBtn) loginBtn.disabled = true;

  try {
    const response = await fetch('/api/admin-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });

    const data = await response.json();

    if (!response.ok || !data.authenticated) {
      if (status) {
        status.textContent = 'Access denied';
        status.className = 'error';
      }
      return;
    }

   if (status) {
  status.textContent = 'Access granted';
  status.className = 'success';
}

setTimeout(() => {
  window.location.href = 'admin.html';
}, 500);
  } catch(e) {
    console.warn('Admin login failed:', e);
    if (status) {
      status.textContent = 'Login unavailable';
      status.className = 'error';
    }
  } finally {
    if (loginBtn) loginBtn.disabled = false;
  }
}

document.addEventListener('keydown', (e) => {
  const backdrop = document.getElementById('admin-modal-backdrop');
  const input = document.getElementById('admin-password');

  if (e.key === 'Escape' && backdrop && backdrop.classList.contains('open')) {
    closeAdminModal();
  }

  if (
    e.key === 'Enter' &&
    backdrop &&
    backdrop.classList.contains('open') &&
    document.activeElement === input
  ) {
    submitAdminLogin();
  }
});

// ── AMBIENT MUSIC ──
function startMusic() {
  const audio = new Audio('assets/lobby/ambient.mp3');
  audio.loop = true;
  audio.volume = 0;
  audio.play().catch(() => {});
  // Fade in
  let v = 0;
  const fade = setInterval(() => {
    v = Math.min(v + 0.02, 0.4);
    audio.volume = v;
    if (v >= 0.4) clearInterval(fade);
  }, 100);
  window._music = audio;
}

// ── BOOT SEQUENCE ──
let progress = 0;
const bar = document.getElementById('loading-bar');

function setProgress(p) {
  progress = p;
  bar.style.width = p + '%';
}

// Start music on first user interaction
document.addEventListener('click', function startOnClick() {
  startMusic();
  document.removeEventListener('click', startOnClick);
}, { once: true });

window.addEventListener('load', () => {
  setProgress(20);
  setTimeout(() => {
    // Fade in video when ready
    const vid = document.getElementById('bgVideo');
    vid.addEventListener('canplay', () => {
      vid.style.opacity = '1';
    }, { once: true });
    // Fallback fade in after 1s regardless
    setTimeout(() => { vid.style.opacity = '1'; }, 1000);
    setProgress(60);
    setTimeout(() => {
      setProgress(100);
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('ui').style.opacity = '1';
        startMusic();
      }, 600);
    }, 800);
  }, 300);
});
</script>
