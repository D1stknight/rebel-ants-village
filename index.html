<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebel Ants — The Hidden Village</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Serif+JP:wght@300;400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#020818;font-family:'Noto Serif JP',serif}
  #renderCanvas{width:100%;height:100%;touch-action:none;display:block}

  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:22px 30px;pointer-events:none;z-index:10}
  #logo h1{font-family:'Cinzel Decorative',serif;font-size:24px;font-weight:900;color:#e8c56a;letter-spacing:4px;text-shadow:0 0 25px rgba(232,197,106,.7),0 2px 6px rgba(0,0,0,.9);line-height:1}
  #logo span{font-size:10px;letter-spacing:7px;color:#5ecfca;text-transform:uppercase;margin-top:5px;display:block;text-shadow:0 0 12px rgba(94,207,202,.6)}
  #controls{font-size:11px;color:rgba(255,255,255,.55);letter-spacing:2px;text-align:right;line-height:2.2;text-transform:uppercase}
  #controls kbd{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:3px;padding:1px 6px;font-size:10px;color:#e8c56a}
  #timeDisplay{position:fixed;top:22px;left:50%;transform:translateX(-50%);font-family:'Cinzel Decorative',serif;font-size:12px;color:rgba(232,197,106,.7);letter-spacing:3px;pointer-events:none;z-index:10;text-shadow:0 0 10px rgba(232,197,106,.4)}

  #crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:8;opacity:0;transition:opacity .3s;width:20px;height:20px}
  #crosshair.visible{opacity:1}
  #crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.75);border-radius:2px}
  #crosshair::before{width:16px;height:2px;top:9px;left:2px}
  #crosshair::after{width:2px;height:16px;top:2px;left:9px}

  #walkBtn{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(2,8,24,.88);border:1px solid rgba(232,197,106,.5);color:#e8c56a;font-family:'Cinzel Decorative',serif;font-size:11px;letter-spacing:3px;padding:13px 30px;cursor:pointer;z-index:10;transition:all .2s;backdrop-filter:blur(10px)}
  #walkBtn:hover{background:rgba(232,197,106,.15)}
  #walkBtn.active{background:rgba(232,197,106,.2);border-color:#e8c56a}

  #tooltip{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(2,8,24,.93);border:1px solid rgba(232,197,106,.45);padding:14px 30px;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s;z-index:20;backdrop-filter:blur(12px);white-space:nowrap}
  #tooltip h3{font-family:'Cinzel Decorative',serif;font-size:13px;color:#e8c56a;letter-spacing:2px;margin-bottom:4px}
  #tooltip p{font-size:11px;color:#5ecfca;letter-spacing:1px}
  #tooltip.visible{opacity:1}

  #panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.92);width:480px;max-width:92vw;max-height:85vh;overflow-y:auto;background:rgba(2,8,24,.97);border:1px solid rgba(232,197,106,.5);padding:38px;z-index:30;opacity:0;pointer-events:none;transition:all .4s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(22px)}
  #panel.open{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1)}
  #panel-close{position:absolute;top:14px;right:18px;background:none;border:none;color:rgba(232,197,106,.5);font-size:22px;cursor:pointer;transition:color .2s}
  #panel-close:hover{color:#e8c56a}
  #panel h2{font-family:'Cinzel Decorative',serif;font-size:17px;color:#e8c56a;letter-spacing:2px;margin-bottom:7px}
  .psub{font-size:10px;color:#5ecfca;letter-spacing:3px;text-transform:uppercase;margin-bottom:22px;border-bottom:1px solid rgba(232,197,106,.15);padding-bottom:18px}
  #panel-desc{font-size:13px;color:rgba(255,255,255,.78);line-height:2;margin-bottom:22px}
  #panel-icon{font-size:44px;margin-bottom:18px;display:block}
  .plinks{display:flex;flex-wrap:wrap;gap:9px}
  .pb{display:inline-block;background:linear-gradient(135deg,#e8c56a,#c9993a);color:#020818;font-family:'Cinzel Decorative',serif;font-size:10px;letter-spacing:2px;padding:11px 20px;border:none;cursor:pointer;text-decoration:none;transition:opacity .2s}
  .pb:hover{opacity:.82}
  .pb.g{background:transparent;border:1px solid rgba(232,197,106,.4);color:#e8c56a}
  .pb.t{background:linear-gradient(135deg,#5ecfca,#2a9090);color:#020818}
  .pb.r{background:linear-gradient(135deg,#c0392b,#8a1a10);color:#fff}

  #loading{position:fixed;inset:0;background:#020818;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 1s}
  #loading h1{font-family:'Cinzel Decorative',serif;font-size:32px;color:#e8c56a;letter-spacing:5px;margin-bottom:10px;text-shadow:0 0 40px rgba(232,197,106,.6)}
  #loading .sub{font-size:11px;color:#5ecfca;letter-spacing:7px;text-transform:uppercase;margin-bottom:50px;animation:pulse 2s infinite}
  #loadStatus{font-size:11px;color:rgba(232,197,106,.5);letter-spacing:2px;margin-top:20px;text-transform:uppercase}
  .lb{width:240px;height:2px;background:rgba(232,197,106,.12);position:relative;overflow:hidden}
  .lf{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,#e8c56a,transparent);animation:sweep 1.6s infinite}
  @keyframes sweep{to{left:100%}}
  @keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  #vignette{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.4) 100%);pointer-events:none;z-index:4}
</style>
</head>
<body>

<div id="loading">
  <h1>REBEL ANTS</h1>
  <div class="sub">Building the Hidden Village...</div>
  <div class="lb"><div class="lf"></div></div>
  <div id="loadStatus">Loading assets...</div>
</div>

<canvas id="renderCanvas"></canvas>
<div id="vignette"></div>
<div id="crosshair"></div>
<div id="timeDisplay"></div>

<div id="hud">
  <div id="logo"><h1>REBEL ANTS</h1><span>The Hidden Village</span></div>
  <div id="controls">
    <kbd>W A S D</kbd> Move<br>
    <kbd>Mouse</kbd> Look<br>
    <kbd>Click</kbd> Interact<br>
    <kbd>ESC</kbd> Free cam
  </div>
</div>

<button id="walkBtn" onclick="toggleWalk()">⚔️ &nbsp; ENTER VILLAGE</button>

<div id="tooltip"><h3 id="tt-title">—</h3><p id="tt-sub">Click to enter</p></div>

<div id="panel">
  <button id="panel-close">✕</button>
  <span id="panel-icon">⚔️</span>
  <h2 id="panel-title">—</h2>
  <div class="psub" id="panel-sub">Rebel Ants</div>
  <p id="panel-desc">—</p>
  <div class="plinks" id="panel-actions"></div>
</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
<script src="https://cdn.babylonjs.com/proceduralTexturesLibrary/babylonjs.proceduralTextures.min.js"></script>

<script>
const canvas = document.getElementById('renderCanvas');
const engine = new BABYLON.Engine(canvas, true, {preserveDrawingBuffer:true, stencil:true, adaptToDeviceRatio:true});
const setStatus = t => document.getElementById('loadStatus').textContent = t;

// ── SCENE ─────────────────────────────────────────
const scene = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.53, 0.81, 0.98, 1);

// ── CAMERAS ───────────────────────────────────────
const orbitCam = new BABYLON.ArcRotateCamera("orbit", -Math.PI/2.2, Math.PI/3.5, 120, new BABYLON.Vector3(0,8,0), scene);
orbitCam.lowerRadiusLimit = 10;
orbitCam.upperRadiusLimit = 250;
orbitCam.upperBetaLimit   = Math.PI/2.05;
orbitCam.wheelPrecision   = 2;
orbitCam.attachControl(canvas, true);

const walkCam = new BABYLON.UniversalCamera("walk", new BABYLON.Vector3(0, 4, 80), scene);
walkCam.setTarget(new BABYLON.Vector3(0, 4, 0));
walkCam.speed = 0.8;
walkCam.angularSensibility = 700;
walkCam.keysUp    = [87,38];
walkCam.keysDown  = [83,40];
walkCam.keysLeft  = [65,37];
walkCam.keysRight = [68,39];
walkCam.minZ = 0.5;
scene.activeCamera = orbitCam;
let walkMode = false;

// ── SUN / DIRECTIONAL LIGHT ───────────────────────
const sunLight = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-1,-2,1), scene);
sunLight.intensity = 2.5;
sunLight.diffuse   = new BABYLON.Color3(1.0, 0.95, 0.85);
sunLight.position  = new BABYLON.Vector3(200, 300, -200);

// Hemisphere fill
const hemi = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0,1,0), scene);
hemi.intensity    = 0.6;
hemi.diffuse      = new BABYLON.Color3(0.6,0.75,1.0);
hemi.groundColor  = new BABYLON.Color3(0.3,0.25,0.2);
hemi.specular     = new BABYLON.Color3(0,0,0);

// Shadows
const shadowGen = new BABYLON.ShadowGenerator(2048, sunLight);
shadowGen.useBlurExponentialShadowMap = true;
shadowGen.blurKernel = 24;
shadowGen.bias = 0.001;

// ── PROCEDURAL SKY ────────────────────────────────
let skyMat, skybox;
function buildSky(){
  skybox = BABYLON.MeshBuilder.CreateBox("skyBox", {size: 1000}, scene);
  skyMat  = new BABYLON.SkyMaterial("skyMat", scene);
  skyMat.backFaceCulling = false;
  skyMat.turbidity       = 8;
  skyMat.luminance       = 0.9;
  skyMat.inclination     = 0;   // will be updated by time
  skyMat.azimuth         = 0.25;
  skyMat.rayleigh        = 2.5;
  skyMat.mieCoefficient  = 0.005;
  skyMat.mieDirectionalG = 0.98;
  skybox.material = skyMat;
  skybox.infiniteDistance = true;

  // Reflect sky in sun light
  skyMat.useSunPosition = true;
  skyMat.sunPosition = sunLight.position;
}
buildSky();

// ── REAL-TIME SKY / LIGHTING ──────────────────────
function updateDayNight(){
  const now  = new Date();
  const hour = now.getHours() + now.getMinutes()/60;
  const t    = hour / 24;

  // Inclination: -0.5 (midnight) to 0.5 (noon)
  const incl = Math.sin((t - 0.25) * Math.PI * 2) * 0.5;
  if(skyMat) skyMat.inclination = incl;

  // Sun intensity based on time
  const dayStrength = Math.max(0, Math.sin((t - 0.25) * Math.PI * 2));
  sunLight.intensity = 0.3 + dayStrength * 2.8;

  // Sun color — warm at sunrise/sunset, white at noon, dim at night
  if(hour >= 6 && hour < 9){
    sunLight.diffuse = new BABYLON.Color3(1.0, 0.65, 0.35); // sunrise warm
  } else if(hour >= 9 && hour < 17){
    sunLight.diffuse = new BABYLON.Color3(1.0, 0.98, 0.9);  // daytime white
  } else if(hour >= 17 && hour < 20){
    sunLight.diffuse = new BABYLON.Color3(1.0, 0.55, 0.2);  // sunset orange
  } else {
    sunLight.diffuse = new BABYLON.Color3(0.2, 0.25, 0.5);  // night blue
    sunLight.intensity = 0.2;
  }

  // Hemi matches sky
  hemi.intensity = 0.2 + dayStrength * 0.65;

  // Display time
  const hStr = now.getHours().toString().padStart(2,'0');
  const mStr = now.getMinutes().toString().padStart(2,'0');
  const period = now.getHours()<12?'AM':'PM';
  const label  = hour<6||hour>=20 ? '🌙 Night' : hour<9 ? '🌅 Sunrise' : hour<17 ? '☀️ Day' : '🌇 Sunset';
  document.getElementById('timeDisplay').textContent = `${hStr}:${mStr} ${period}  ·  ${label}`;
}
updateDayNight();
setInterval(updateDayNight, 30000); // update every 30s

// ── TERRAIN / GROUND ──────────────────────────────
setStatus("Building terrain...");
(()=>{
  // Main valley floor — large flat area for the village
  const ground = BABYLON.MeshBuilder.CreateGround("ground", {
    width:400, height:400, subdivisions:80
  }, scene);

  const gMat = new BABYLON.StandardMaterial("gMat", scene);
  gMat.diffuseColor  = new BABYLON.Color3(0.55, 0.48, 0.32);
  gMat.specularColor = new BABYLON.Color3(0.05, 0.05, 0.05);

  // Procedural grass texture
  try {
    const grassTex = new BABYLON.GrassProceduralTexture("grassTex", 512, scene);
    grassTex.numberOfTiles = 8;
    gMat.diffuseTexture = grassTex;
    gMat.diffuseTexture.uScale = 40;
    gMat.diffuseTexture.vScale = 40;
  } catch(e){
    gMat.diffuseColor = new BABYLON.Color3(0.38, 0.42, 0.28);
  }
  ground.material = gMat;
  ground.receiveShadows = true;
  ground.position.y = 0;

  // Sand/courtyard area in center
  const courtyard = BABYLON.MeshBuilder.CreateGround("courtyard", {width:160, height:160}, scene);
  const cMat = new BABYLON.StandardMaterial("cMat", scene);
  cMat.diffuseColor  = new BABYLON.Color3(0.78, 0.72, 0.56);
  cMat.specularColor = new BABYLON.Color3(0.04,0.04,0.04);
  courtyard.material = cMat;
  courtyard.position.y = 0.05;
  courtyard.receiveShadows = true;

  // Stone paths
  const pathMat = new BABYLON.StandardMaterial("pathMat", scene);
  pathMat.diffuseColor = new BABYLON.Color3(0.55, 0.52, 0.48);
  pathMat.specularColor = new BABYLON.Color3(0.05,0.05,0.05);

  // Main cross paths
  for(let [w,h,x,z] of [[8,180,0,0],[180,8,0,0]]){
    const p = BABYLON.MeshBuilder.CreateGround("path_"+w+"_"+z,{width:w,height:h},scene);
    p.material = pathMat; p.position = new BABYLON.Vector3(x,0.1,z);
    p.receiveShadows=true;
  }
  // Diagonal paths
  for(let angle of [Math.PI/4, -Math.PI/4]){
    const p = BABYLON.MeshBuilder.CreateGround("pathD_"+angle,{width:6,height:200},scene);
    p.material=pathMat; p.position.y=0.08; p.rotation.y=angle;
    p.receiveShadows=true;
  }
})();

// ── MOUNTAINS ─────────────────────────────────────
setStatus("Sculpting mountains...");
(()=>{
  const mountainMat = new BABYLON.StandardMaterial("mtnMat", scene);
  mountainMat.diffuseColor  = new BABYLON.Color3(0.28, 0.32, 0.22);
  mountainMat.specularColor = new BABYLON.Color3(0.02,0.02,0.02);

  const snowMat = new BABYLON.StandardMaterial("snowMat", scene);
  snowMat.diffuseColor = new BABYLON.Color3(0.92,0.95,1.0);

  // Ring of mountains around the valley
  const mountains = [
    // [x, z, radiusBase, height, segments]
    [-280, -220, 85, 160, 6],
    [-180, -300, 70, 130, 5],
    [-350, -80,  90, 145, 7],
    [260,  -200, 80, 155, 6],
    [180,  -310, 65, 120, 5],
    [340,  -60,  95, 170, 7],
    [-260,  220, 75, 140, 6],
    [240,   250, 88, 160, 6],
    [0,    -350, 100,175, 8],
    [0,     330, 92, 155, 7],
    [-320,  100, 78, 135, 6],
    [300,   120, 82, 148, 6],
    // Closer mid-range hills
    [-140, -160, 45, 70, 5],
    [140,  -160, 42, 65, 5],
    [-140,  160, 48, 72, 5],
    [140,   160, 44, 68, 5],
  ];

  mountains.forEach(([x,z,rb,h,seg],i)=>{
    // Main mountain body
    const mtn = BABYLON.MeshBuilder.CreateCylinder("mtn"+i,{
      diameterTop:0, diameterBottom:rb*2, height:h, tessellation:seg
    }, scene);
    mtn.material = mountainMat;
    mtn.position = new BABYLON.Vector3(x, h/2-5, z);
    mtn.rotation.y = Math.random()*Math.PI;
    shadowGen.addShadowCaster(mtn);
    mtn.receiveShadows = true;

    // Snow cap
    const snowH = h*0.22;
    const snowR  = rb*0.28;
    const snow = BABYLON.MeshBuilder.CreateCylinder("snow"+i,{
      diameterTop:0, diameterBottom:snowR*2, height:snowH, tessellation:seg
    }, scene);
    snow.material = snowMat;
    snow.position = new BABYLON.Vector3(x, h-4, z);
    shadowGen.addShadowCaster(snow);

    // Secondary smaller peak beside main
    if(i<8){
      const mtn2 = BABYLON.MeshBuilder.CreateCylinder("mtn2_"+i,{
        diameterTop:0, diameterBottom:rb*1.3, height:h*0.75, tessellation:seg-1
      }, scene);
      mtn2.material = mountainMat;
      mtn2.position = new BABYLON.Vector3(x+rb*0.6, h*0.75/2-5, z+rb*0.4);
      mtn2.rotation.y = Math.random()*Math.PI;
      shadowGen.addShadowCaster(mtn2);
    }
  });
})();

// ── WATER / RIVER ─────────────────────────────────
(()=>{
  const water = BABYLON.MeshBuilder.CreateGround("water",{width:30, height:200},scene);
  const wMat  = new BABYLON.StandardMaterial("wMat",scene);
  wMat.diffuseColor  = new BABYLON.Color3(0.15, 0.4, 0.7);
  wMat.specularColor = new BABYLON.Color3(0.8, 0.9, 1.0);
  wMat.specularPower = 128;
  wMat.alpha = 0.85;
  water.material = wMat;
  water.position = new BABYLON.Vector3(90, 0.12, 0);
})();

// ── STYLIZED TREES ────────────────────────────────
setStatus("Planting trees...");
(()=>{
  function tree(id, x, z, h=8, trunk=0.6, leafColor=null){
    const trunkMat = new BABYLON.StandardMaterial("trkM"+id,scene);
    trunkMat.diffuseColor = new BABYLON.Color3(0.28,0.18,0.1);

    const leafMat = new BABYLON.StandardMaterial("leafM"+id,scene);
    const lc = leafColor || new BABYLON.Color3(
      0.1+Math.random()*0.15, 0.35+Math.random()*0.2, 0.08+Math.random()*0.1
    );
    leafMat.diffuseColor = lc;

    const trunk3d = BABYLON.MeshBuilder.CreateCylinder("trk"+id,{
      diameterTop:trunk*0.5, diameterBottom:trunk, height:h*0.55, tessellation:7
    },scene);
    trunk3d.material = trunkMat;
    trunk3d.position = new BABYLON.Vector3(x, h*0.275, z);
    shadowGen.addShadowCaster(trunk3d);
    trunk3d.receiveShadows=true;

    // Multi-layer foliage
    const layers = [[h*.65, h*.55],[h*.82, h*.38],[h*.94, h*.22]];
    layers.forEach(([ly,lr],li)=>{
      const leaf = BABYLON.MeshBuilder.CreateSphere("leaf"+id+"_"+li,{
        diameter:lr*2.2, segments:6
      },scene);
      leaf.material = leafMat;
      leaf.scaling.y = 0.72;
      leaf.position = new BABYLON.Vector3(x+(li*.1-.1)*2, ly, z+(li*.05)*2);
      shadowGen.addShadowCaster(leaf);
      leaf.receiveShadows=true;
    });
  }

  // Dense forest around perimeter
  let ti=0;
  for(let ring=0;ring<3;ring++){
    const r = 100+ring*28;
    const count = 24+ring*12;
    for(let i=0;i<count;i++){
      const angle = (i/count)*Math.PI*2;
      const jitter = (Math.random()-.5)*22;
      const x = Math.cos(angle)*r+jitter;
      const z = Math.sin(angle)*r+jitter;
      const h = 7+Math.random()*10;
      // Cherry blossom tint for some
      const isCherry = Math.random()<0.25;
      const leafCol = isCherry
        ? new BABYLON.Color3(0.9,0.6,0.7)
        : new BABYLON.Color3(0.1+Math.random()*.15, 0.3+Math.random()*.25, 0.08);
      tree(ti++,x,z,h,0.5+Math.random()*.4,leafCol);
    }
  }

  // Bonsai/accent trees in courtyard
  const courtyardTrees = [
    [-45,0],[-45,30],[-45,-30],[45,0],[45,30],[45,-30],
    [0,-45],[0,45],[20,-45],[-20,-45],[20,45],[-20,45],
    [-35,35],[35,35],[-35,-35],[35,-35]
  ];
  courtyardTrees.forEach(([x,z])=>{
    tree(ti++,x,z,5+Math.random()*3,0.3,
      Math.random()<0.35
        ? new BABYLON.Color3(0.85,0.55,0.65) // cherry
        : new BABYLON.Color3(0.1,0.32,0.1)
    );
  });
})();

// ── ROCKS ─────────────────────────────────────────
(()=>{
  const rockMat = new BABYLON.StandardMaterial("rockMat",scene);
  rockMat.diffuseColor  = new BABYLON.Color3(0.4,0.4,0.42);
  rockMat.specularColor = new BABYLON.Color3(0.08,0.08,0.08);
  [
    [-55,-35,1.2],[-54,-34,.7],[55,-35,1.1],[55,-34,.6],
    [-55,35,.9],[55,35,1.0],[-30,55,.8],[30,55,.7],
    [-30,-55,.9],[30,-55,.8],[60,0,1.1],[-60,0,.9],
    [0,-60,1.2],[0,60,.8]
  ].forEach(([x,z,s],i)=>{
    const r = BABYLON.MeshBuilder.CreateSphere("rock"+i,{diameter:s*2.8, segments:4},scene);
    r.material = rockMat;
    r.position = new BABYLON.Vector3(x, s*.6, z);
    r.scaling = new BABYLON.Vector3(1+Math.random()*.4, .55+Math.random()*.3, 1+Math.random()*.3);
    r.rotation.y = Math.random()*Math.PI*2;
    shadowGen.addShadowCaster(r);
    r.receiveShadows=true;
  });
})();

// ── FENCE / WALL PERIMETER ────────────────────────
(()=>{
  const postMat = new BABYLON.StandardMaterial("postMat",scene);
  postMat.diffuseColor = new BABYLON.Color3(0.26,0.16,0.08);
  const railMat = new BABYLON.StandardMaterial("railMat",scene);
  railMat.diffuseColor = new BABYLON.Color3(0.22,0.13,0.06);

  const W=68;
  const corners=[[-W,-W,W,-W],[-W,W,W,W],[-W,-W,-W,W],[W,-W,W,W]];
  corners.forEach(([x1,z1,x2,z2],si)=>{
    const dx=x2-x1,dz=z2-z1,len=Math.sqrt(dx*dx+dz*dz);
    const cx=(x1+x2)/2,cz=(z1+z2)/2;
    const ang=Math.atan2(dx,dz);
    for(let ry of[1.8,1.1]){
      const rail=BABYLON.MeshBuilder.CreateBox("rail"+si+"_"+ry,{width:len,height:.12,depth:.14},scene);
      rail.material=railMat; rail.position=new BABYLON.Vector3(cx,ry,cz); rail.rotation.y=ang;
      shadowGen.addShadowCaster(rail);
    }
    for(let i=0;i<=Math.floor(len/3.5);i++){
      const t=i/Math.floor(len/3.5);
      const post=BABYLON.MeshBuilder.CreateBox("post"+si+"_"+i,{width:.18,height:2.1,depth:.18},scene);
      post.material=postMat; post.position=new BABYLON.Vector3(x1+dx*t,.9,z1+dz*t);
      shadowGen.addShadowCaster(post); post.receiveShadows=true;
    }
  });
})();

// ── TORII GATES ───────────────────────────────────
(()=>{
  const toriiMat = new BABYLON.StandardMaterial("toriiMat",scene);
  toriiMat.diffuseColor = new BABYLON.Color3(0.75,0.12,0.08);
  const goldMat = new BABYLON.StandardMaterial("toriiGold",scene);
  goldMat.diffuseColor  = new BABYLON.Color3(0.9,0.76,0.28);
  goldMat.emissiveColor = new BABYLON.Color3(0.15,0.12,0.0);

  function torii(id,x,z,ry=0){
    const root=new BABYLON.TransformNode("torii_"+id,scene);
    root.position=new BABYLON.Vector3(x,0,z);
    root.rotation.y=ry;

    for(let s of[-1,1]){
      const p=BABYLON.MeshBuilder.CreateCylinder("tp"+id+s,{diameterTop:.32,diameterBottom:.4,height:7,tessellation:10},scene);
      p.material=toriiMat; p.position=new BABYLON.Vector3(s*2.2,3.5,0); p.parent=root;
      shadowGen.addShadowCaster(p);
      const base=BABYLON.MeshBuilder.CreateBox("tb"+id+s,{width:.7,height:.4,depth:.7},scene);
      base.material=new BABYLON.StandardMaterial("tbs"+id+s,scene);
      base.material.diffuseColor=new BABYLON.Color3(.35,.35,.38);
      base.position=new BABYLON.Vector3(s*2.2,-.02,0); base.parent=root;
    }
    const bar1=BABYLON.MeshBuilder.CreateBox("tbar1_"+id,{width:5.8,height:.38,depth:.38},scene);
    bar1.material=toriiMat; bar1.position=new BABYLON.Vector3(0,4.0,0); bar1.parent=root;
    shadowGen.addShadowCaster(bar1);
    const bar2=BABYLON.MeshBuilder.CreateBox("tbar2_"+id,{width:5.1,height:.3,depth:.3},scene);
    bar2.material=toriiMat; bar2.position=new BABYLON.Vector3(0,3.5,0); bar2.parent=root;

    // Curved end caps
    for(let s of[-1,1]){
      const cap=BABYLON.MeshBuilder.CreateBox("tcap"+id+s,{width:.4,height:.38,depth:.55},scene);
      cap.material=toriiMat; cap.position=new BABYLON.Vector3(s*3.1,4.2,0); cap.rotation.z=s*-.18; cap.parent=root;
    }
    const plate=BABYLON.MeshBuilder.CreateBox("tplate_"+id,{width:1.8,height:.42,depth:.12},scene);
    plate.material=goldMat; plate.position=new BABYLON.Vector3(0,3.88,0); plate.parent=root;
  }

  torii(0, 0, 75);
  torii(1, 0, 65);
  torii(2, -65, 0, Math.PI/2);
  torii(3,  65, 0, Math.PI/2);
  torii(4, 0, -65, Math.PI);
})();

// ── FIRE BOWLS ────────────────────────────────────
const fireLights=[];
(()=>{
  function fireBowl(id,x,z){
    const sm=new BABYLON.StandardMaterial("fsm"+id,scene);
    sm.diffuseColor=new BABYLON.Color3(.25,.25,.28);
    const bm=new BABYLON.StandardMaterial("fbm"+id,scene);
    bm.diffuseColor=new BABYLON.Color3(.3,.3,.32);
    const fm=new BABYLON.StandardMaterial("ffm"+id,scene);
    fm.diffuseColor=new BABYLON.Color3(1,.5,.05);
    fm.emissiveColor=new BABYLON.Color3(.8,.3,.0);

    const stand=BABYLON.MeshBuilder.CreateCylinder("fst"+id,{diameterTop:.08,diameterBottom:.08,height:1.3,tessellation:6},scene);
    stand.material=sm; stand.position=new BABYLON.Vector3(x,.65,z);
    const bowl=BABYLON.MeshBuilder.CreateCylinder("fbl"+id,{diameterTop:.9,diameterBottom:.5,height:.5,tessellation:10},scene);
    bowl.material=bm; bowl.position=new BABYLON.Vector3(x,1.35,z);
    const glow=BABYLON.MeshBuilder.CreateSphere("fgl"+id,{diameter:.38},scene);
    glow.material=fm; glow.position=new BABYLON.Vector3(x,1.58,z);

    fl.diffuse=new BABYLON.Color3(1,.45,.08);
    fl.intensity=3; fl.range=16;
    fl._base=3; fireLights.push(fl);

    shadowGen.addShadowCaster(stand);
    shadowGen.addShadowCaster(bowl);
  }

  const positions=[
    [-3,72],[3,72],[-3,-3],[3,-3],
    [-22,2],[22,2],[-22,-2],[22,-2],
    [-3,55],[3,55],[-3,-55],[3,-55],
    [-55,3],[55,3],[0,0]
  ];
  positions.forEach(([x,z],i)=>fireBowl(i,x,z));
})();

// ── HANGING LANTERNS ──────────────────────────────
const lanternLights=[];
(()=>{
  let li=0;
  function hangLantern(x,y,z,color,chainH=1.5){
    const chainMat=new BABYLON.StandardMaterial("cm"+li,scene);
    chainMat.diffuseColor=new BABYLON.Color3(.5,.5,.5);
    const bodyMat=new BABYLON.StandardMaterial("bm"+li,scene);
    bodyMat.diffuseColor=new BABYLON.Color3(1,.94,.7);
    bodyMat.emissiveColor=BABYLON.Color3.FromHexString(color);
    bodyMat.alpha=0.92;

    const root=new BABYLON.TransformNode("lan"+li,scene);
    root.position=new BABYLON.Vector3(x,y,z);

    const chain=BABYLON.MeshBuilder.CreateCylinder("lc"+li,{diameterTop:.025,diameterBottom:.025,height:chainH,tessellation:4},scene);
    chain.material=chainMat; chain.position=new BABYLON.Vector3(0,chainH/2,0); chain.parent=root;

    const body=BABYLON.MeshBuilder.CreateCylinder("lb"+li,{diameterTop:.26,diameterBottom:.26,height:.65,tessellation:10},scene);
    body.material=bodyMat; body.position=new BABYLON.Vector3(0,-.42,0); body.parent=root;

    const capM=new BABYLON.StandardMaterial("lcap"+li,scene);
    capM.diffuseColor=new BABYLON.Color3(.24,.14,.06);
    const tc=BABYLON.MeshBuilder.CreateBox("ltc"+li,{width:.24,height:.1,depth:.24},scene);
    tc.material=capM; tc.position=new BABYLON.Vector3(0,-.07,0); tc.parent=root;
    const bc=BABYLON.MeshBuilder.CreateBox("lbc"+li,{width:.24,height:.1,depth:.24},scene);
    bc.material=capM; bc.position=new BABYLON.Vector3(0,-.77,0); bc.parent=root;

    const ll=new BABYLON.PointLight("ll"+li,new BABYLON.Vector3(x,y-.42,z),scene);
    ll.diffuse=BABYLON.Color3.FromHexString(color);
    ll.intensity=1.1; ll.range=9;
    ll._base=1.1; lanternLights.push(ll);
    li++;
  }

  function lanternString(x1,z1,x2,z2,y,n,color){
    // Rope
    const pts=[];
    for(let i=0;i<=18;i++){const t=i/18,sag=Math.sin(t*Math.PI)*-1.3;pts.push(new BABYLON.Vector3(x1+(x2-x1)*t,y+sag,z1+(z2-z1)*t));}
    const tube=BABYLON.MeshBuilder.CreateTube("rope"+li,{path:pts,radius:.025,tessellation:4},scene);
    const rm=new BABYLON.StandardMaterial("rm"+li,scene);rm.diffuseColor=new BABYLON.Color3(.36,.28,.18);tube.material=rm;
    for(let i=0;i<=n;i++){const t=i/n,sag=Math.sin(t*Math.PI)*-1.3;hangLantern(x1+(x2-x1)*t,y+sag-.05,z1+(z2-z1)*t,color,.8);}
  }

  // Main village lantern strings
  lanternString(-28,-28, 28,-28, 13, 7, "#ffdd88");
  lanternString(-28, 28, 28, 28, 13, 7, "#ff9944");
  lanternString(-28,-28,-28, 28, 13, 7, "#ff5555");
  lanternString( 28,-28, 28, 28, 13, 7, "#44aaff");
  lanternString(-20,-20, 20, 20, 14, 6, "#ffdd88");
  lanternString( 20,-20,-20, 20, 14, 6, "#5ecfca");
  lanternString(-28,  0, 28,  0, 12, 8, "#ffaa44");
  lanternString(  0,-28,  0, 28, 12, 8, "#ddccff");
})();

setStatus("Loading temple...");

const BUILDINGS=[];

// Building placement config — 6 locations around the village

// Load ONE GLB and clone it for all 6 positions
BABYLON.SceneLoader.ImportMesh("", "", "japanese_temple.glb", scene,
  function(meshes, particleSystems, skeletons, animGroups){
    setStatus("Placing buildings...");

    if(!meshes || meshes.length===0){
      setStatus("Error loading temple — using fallback");
      return;
    }

    // Find root mesh
    const root = meshes[0];
    root.setEnabled(false); // hide original, we'll clone

    buildingConfigs.forEach((cfg, idx)=>{
      // Clone the whole hierarchy
      const clone = root.clone("temple_"+cfg.id, null, true);
      if(!clone) return;

      // Clone children too
      meshes.forEach((m,mi)=>{
        if(mi===0) return;
        const mc = m.clone("tm_"+cfg.id+"_"+mi, clone);
        if(mc){
          mc.setEnabled(true);
          mc.receiveShadows = true;
          shadowGen.addShadowCaster(mc);
        }
      });

      clone.setEnabled(true);
      clone.position = new BABYLON.Vector3(cfg.x, 0, cfg.z);
      clone.rotation = new BABYLON.Vector3(0, cfg.ry, 0);
      clone.scaling  = new BABYLON.Vector3(cfg.scale, cfg.scale, cfg.scale);
      clone.receiveShadows = true;
      shadowGen.addShadowCaster(clone);

      // Invisible trigger box for clicking
      const trigger = BABYLON.MeshBuilder.CreateBox("trigger_"+cfg.id,{width:18,height:20,depth:18},scene);
      trigger.position = new BABYLON.Vector3(cfg.x, 10, cfg.z);
      trigger.isPickable = true;
      trigger.visibility = 0;

      BUILDINGS.push({
        mesh: trigger,
        ...cfg
      });

      // Colored point light to distinguish each building
      const colors=["#ffdd66","#00ffee","#ff5555","#ffaa22","#ffcc00","#cc44ff"];
      const bl=new BABYLON.PointLight("bl"+idx,new BABYLON.Vector3(cfg.x,8,cfg.z),scene);
      bl.diffuse=BABYLON.Color3.FromHexString(colors[idx%colors.length]);
      bl.intensity=1.2; bl.range=20;
      lanternLights.push(bl); bl._base=1.2;
    });

    setStatus("Village ready!");
    fadeOutLoading();
  },
  function(progress){
    const pct = Math.round((progress.loaded/Math.max(progress.total,1))*100);
    setStatus(`Loading temple... ${pct}%`);
  },
  function(scene, msg, ex){
    console.error("GLB load error:", msg, ex);
    setStatus("Building fallback village...");
    buildFallbackBuildings();
    fadeOutLoading();
  }
);

// ── FALLBACK if GLB fails ─────────────────────────
function buildFallbackBuildings(){
  const mat=new BABYLON.StandardMaterial("fbMat",scene);
  mat.diffuseColor=new BABYLON.Color3(0.08,0.14,0.28);

  buildingConfigs.forEach(cfg=>{
    const b=BABYLON.MeshBuilder.CreateBox("fb_"+cfg.id,{width:16,height:18,depth:14},scene);
    b.material=mat; b.position=new BABYLON.Vector3(cfg.x,9,cfg.z);
    b.isPickable=true; shadowGen.addShadowCaster(b); b.receiveShadows=true;
    BUILDINGS.push({mesh:b,...cfg});

    // Pagoda-style roof cone
    const roof=BABYLON.MeshBuilder.CreateCylinder("fbr_"+cfg.id,{diameterTop:0,diameterBottom:22,height:8,tessellation:4},scene);
    roof.material=new BABYLON.StandardMaterial("rM"+cfg.id,scene);
    roof.material.diffuseColor=new BABYLON.Color3(0.3,0.38,0.15);
    roof.rotation.y=Math.PI/4;
    roof.position=new BABYLON.Vector3(cfg.x,22,cfg.z);
    shadowGen.addShadowCaster(roof);
  });
}

// ── INTERACTION ───────────────────────────────────
const tooltip=document.getElementById('tooltip');
const panel  =document.getElementById('panel');

scene.onPointerObservable.add(evt=>{
  if(evt.type!==BABYLON.PointerEventTypes.POINTERPICK) return;
  if(panel.classList.contains('open')) return;
  const hit=evt.pickInfo;
  if(!hit||!hit.hit) return;
  const b=BUILDINGS.find(b=>b.mesh===hit.pickedMesh);
  if(b) openPanel(b);
});

scene.onPointerObservable.add(evt=>{
  if(evt.type!==BABYLON.PointerEventTypes.POINTERMOVE||walkMode) return;
  const hit=scene.pick(scene.pointerX,scene.pointerY,m=>BUILDINGS.some(b=>b.mesh===m));
  if(hit&&hit.hit){
    const b=BUILDINGS.find(b=>b.mesh===hit.pickedMesh);
    if(b){ document.getElementById('tt-title').textContent=b.title; document.getElementById('tt-sub').textContent=b.sub; tooltip.classList.add('visible'); canvas.style.cursor='pointer'; return; }
  }
  tooltip.classList.remove('visible'); canvas.style.cursor='default';
});

document.getElementById('panel-close').addEventListener('click',()=>panel.classList.remove('open'));

function openPanel(b){
  document.getElementById('panel-icon').textContent=b.icon;
  document.getElementById('panel-title').textContent=b.title;
  document.getElementById('panel-sub').textContent=b.sub;
  document.getElementById('panel-desc').textContent=b.desc;
  const acts=document.getElementById('panel-actions'); acts.innerHTML='';
  b.actions.forEach(a=>{
    const btn=document.createElement('a');
    btn.className='pb'+(a.g?' g':a.t?' t':a.r?' r':'');
    btn.textContent=a.label; btn.href=a.href; btn.target='_blank'; btn.rel='noopener';
    acts.appendChild(btn);
  });
  panel.classList.add('open');
}

// ── WALK MODE ─────────────────────────────────────
function toggleWalk(){
  walkMode=!walkMode;
  const btn=document.getElementById('walkBtn');
  const ch=document.getElementById('crosshair');
  if(walkMode){
    scene.activeCamera=walkCam;
    walkCam.attachControl(canvas,true);
    orbitCam.detachControl();
    canvas.requestPointerLock();
    btn.textContent='🌐  EXIT WALK MODE'; btn.classList.add('active');
    ch.classList.add('visible');
  } else {
    scene.activeCamera=orbitCam;
    orbitCam.attachControl(canvas,true);
    walkCam.detachControl();
    document.exitPointerLock();
    btn.textContent='⚔️  ENTER VILLAGE'; btn.classList.remove('active');
    ch.classList.remove('visible');
  }
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&walkMode) toggleWalk(); });

// ── RENDER LOOP ───────────────────────────────────
let t=0;
engine.runRenderLoop(()=>{
  t+=engine.getDeltaTime()*.001;
  fireLights.forEach(fl=>{ fl.intensity=fl._base+Math.sin(t*9+fl.position.x*3)*.6+Math.sin(t*14+fl.position.z)*.3; });
  lanternLights.forEach(ll=>{ if(ll._base) ll.intensity=ll._base+Math.sin(t*1.8+ll.position.x*.4)*.1; });
  scene.render();
});
window.addEventListener('resize',()=>engine.resize());

// ── FADE OUT LOADING ──────────────────────────────
function fadeOutLoading(){
  setTimeout(()=>{
    const ld=document.getElementById('loading');
    ld.style.opacity='0';
    setTimeout(()=>ld.style.display='none',1000);
  },800);
}
