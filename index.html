<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebel Ants — The Hidden Village</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Serif+JP:wght@300;400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0a;font-family:'Noto Serif JP',serif}
  #renderCanvas{width:100%;height:100%;touch-action:none;display:block}

  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:20px 28px;pointer-events:none;z-index:10}
  #logo h1{font-family:'Cinzel Decorative',serif;font-size:22px;font-weight:900;color:#e8c56a;letter-spacing:4px;text-shadow:0 0 25px rgba(232,197,106,.8),0 2px 6px rgba(0,0,0,.9);line-height:1}
  #logo span{font-size:10px;letter-spacing:7px;color:#5ecfca;text-transform:uppercase;margin-top:5px;display:block}
  #controls{font-size:11px;color:rgba(255,255,255,.5);letter-spacing:2px;text-align:right;line-height:2.2;text-transform:uppercase}
  #controls kbd{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:3px;padding:1px 6px;font-size:10px;color:#e8c56a}
  #timeDisplay{position:fixed;top:20px;left:50%;transform:translateX(-50%);font-family:'Cinzel Decorative',serif;font-size:12px;color:rgba(232,197,106,.7);letter-spacing:3px;pointer-events:none;z-index:10}

  #crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:8;opacity:0;transition:opacity .3s;width:24px;height:24px}
  #crosshair.visible{opacity:1}
  #crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.8);border-radius:2px}
  #crosshair::before{width:18px;height:2px;top:11px;left:3px}
  #crosshair::after{width:2px;height:18px;top:3px;left:11px}

  #walkBtn{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(2,8,24,.9);border:1px solid rgba(232,197,106,.55);color:#e8c56a;font-family:'Cinzel Decorative',serif;font-size:11px;letter-spacing:3px;padding:13px 32px;cursor:pointer;z-index:10;transition:all .25s;backdrop-filter:blur(12px)}
  #walkBtn:hover{background:rgba(232,197,106,.18);border-color:#e8c56a}
  #walkBtn.active{background:rgba(232,197,106,.22);border-color:#e8c56a;color:#fff}

  #tooltip{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:rgba(2,8,24,.94);border:1px solid rgba(232,197,106,.45);padding:14px 30px;text-align:center;pointer-events:none;opacity:0;transition:opacity .3s;z-index:20;backdrop-filter:blur(12px);white-space:nowrap}
  #tooltip h3{font-family:'Cinzel Decorative',serif;font-size:13px;color:#e8c56a;letter-spacing:2px;margin-bottom:4px}
  #tooltip p{font-size:11px;color:#5ecfca;letter-spacing:1px}
  #tooltip.visible{opacity:1}

  #panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.92);width:480px;max-width:92vw;max-height:85vh;overflow-y:auto;background:rgba(2,8,24,.97);border:1px solid rgba(232,197,106,.5);padding:38px;z-index:30;opacity:0;pointer-events:none;transition:all .4s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(22px)}
  #panel.open{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1)}
  #panel-close{position:absolute;top:14px;right:18px;background:none;border:none;color:rgba(232,197,106,.5);font-size:22px;cursor:pointer;transition:color .2s}
  #panel-close:hover{color:#e8c56a}
  #panel h2{font-family:'Cinzel Decorative',serif;font-size:17px;color:#e8c56a;letter-spacing:2px;margin-bottom:7px}
  .psub{font-size:10px;color:#5ecfca;letter-spacing:3px;text-transform:uppercase;margin-bottom:22px;border-bottom:1px solid rgba(232,197,106,.15);padding-bottom:18px}
  #panel-desc{font-size:13px;color:rgba(255,255,255,.78);line-height:2;margin-bottom:22px}
  #panel-icon{font-size:44px;margin-bottom:18px;display:block}
  .plinks{display:flex;flex-wrap:wrap;gap:9px}
  .pb{display:inline-block;background:linear-gradient(135deg,#e8c56a,#c9993a);color:#020818;font-family:'Cinzel Decorative',serif;font-size:10px;letter-spacing:2px;padding:11px 20px;border:none;cursor:pointer;text-decoration:none;transition:opacity .2s}
  .pb:hover{opacity:.82}
  .pb.g{background:transparent;border:1px solid rgba(232,197,106,.4);color:#e8c56a}
  .pb.t{background:linear-gradient(135deg,#5ecfca,#2a9090);color:#020818}
  .pb.r{background:linear-gradient(135deg,#c0392b,#8a1a10);color:#fff}

  #loading{position:fixed;inset:0;background:#020818;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity 1s}
  #loading h1{font-family:'Cinzel Decorative',serif;font-size:32px;color:#e8c56a;letter-spacing:5px;margin-bottom:10px;text-shadow:0 0 40px rgba(232,197,106,.6)}
  #loading .sub{font-size:11px;color:#5ecfca;letter-spacing:7px;text-transform:uppercase;margin-bottom:50px;animation:pulse 2s infinite}
  #loadStatus{font-size:11px;color:rgba(232,197,106,.5);letter-spacing:2px;margin-top:20px;text-transform:uppercase;text-align:center;max-width:300px}
  .lb{width:240px;height:2px;background:rgba(232,197,106,.12);position:relative;overflow:hidden}
  .lf{position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,#e8c56a,transparent);animation:sweep 1.6s infinite}
  @keyframes sweep{to{left:100%}}@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}
  #vignette{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.35) 100%);pointer-events:none;z-index:4}
</style>
</head>
<body>
<div id="loading">
  <h1>REBEL ANTS</h1>
  <div class="sub">Building the Hidden Village...</div>
  <div class="lb"><div class="lf"></div></div>
  <div id="loadStatus">Initializing world...</div>
</div>
<canvas id="renderCanvas"></canvas>
<div id="vignette"></div>
<div id="crosshair"></div>
<div id="timeDisplay"></div>
<div id="hud">
  <div id="logo"><h1>REBEL ANTS</h1><span>The Hidden Village</span></div>
  <div id="controls"><kbd>W A S D</kbd> Move<br><kbd>Mouse</kbd> Look<br><kbd>Click</kbd> Enter<br><kbd>ESC</kbd> Free cam</div>
</div>
<button id="walkBtn" onclick="toggleWalk()">⚔️ &nbsp; ENTER VILLAGE</button>
<div id="tooltip"><h3 id="tt-title">—</h3><p id="tt-sub">Click to enter</p></div>
<div id="panel">
  <button id="panel-close">✕</button>
  <span id="panel-icon">⚔️</span>
  <h2 id="panel-title">—</h2>
  <div class="psub" id="panel-sub">Rebel Ants</div>
  <p id="panel-desc">—</p>
  <div class="plinks" id="panel-actions"></div>
</div>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>

<script>
const canvas = document.getElementById('renderCanvas');
const engine = new BABYLON.Engine(canvas, true, {preserveDrawingBuffer:true, stencil:true, adaptToDeviceRatio:true});
const setStatus = t => { document.getElementById('loadStatus').textContent = t; console.log(t); };

// ── SCENE ─────────────────────────────────────────
const scene = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.4, 0.6, 0.85, 1);
scene.fogMode = BABYLON.Scene.FOGMODE_EXP;
scene.fogDensity = 0.008;
scene.fogColor = new BABYLON.Color3(0.55, 0.7, 0.88);

// ── CAMERAS ───────────────────────────────────────
const orbitCam = new BABYLON.ArcRotateCamera("orbit", -Math.PI/2.2, Math.PI/3.8, 140, new BABYLON.Vector3(0,5,0), scene);
orbitCam.lowerRadiusLimit = 10;
orbitCam.upperRadiusLimit = 300;
orbitCam.upperBetaLimit = Math.PI/2.05;
orbitCam.wheelPrecision = 2;
orbitCam.attachControl(canvas, true);

const walkCam = new BABYLON.UniversalCamera("walk", new BABYLON.Vector3(0, 3, 90), scene);
walkCam.setTarget(new BABYLON.Vector3(0, 3, 0));
walkCam.speed = 0.7;
walkCam.angularSensibility = 750;
walkCam.keysUp=[87,38]; walkCam.keysDown=[83,40]; walkCam.keysLeft=[65,37]; walkCam.keysRight=[68,39];
walkCam.minZ = 0.3;
scene.activeCamera = orbitCam;
let walkMode = false;

// ── LIGHTING ──────────────────────────────────────
const sunLight = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-0.8,-1.2,0.6), scene);
sunLight.position = new BABYLON.Vector3(150, 250, -150);
sunLight.intensity = 2.8;
sunLight.diffuse = new BABYLON.Color3(1.0, 0.96, 0.88);

const hemi = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0,1,0), scene);
hemi.intensity = 0.7;
hemi.diffuse = new BABYLON.Color3(0.55, 0.72, 1.0);
hemi.groundColor = new BABYLON.Color3(0.28, 0.35, 0.18);
hemi.specular = new BABYLON.Color3(0,0,0);

// Shadow generator
const shadowGen = new BABYLON.ShadowGenerator(2048, sunLight);
shadowGen.useBlurExponentialShadowMap = true;
shadowGen.blurKernel = 24;
shadowGen.bias = 0.001;

// ── PROCEDURAL SKY ────────────────────────────────
const skybox = BABYLON.MeshBuilder.CreateBox("skyBox", {size:1200}, scene);
const skyMat = new BABYLON.SkyMaterial("skyMat", scene);
skyMat.backFaceCulling = false;
skyMat.turbidity = 6;
skyMat.luminance = 1.0;
skyMat.inclination = 0;
skyMat.azimuth = 0.25;
skyMat.rayleigh = 2.8;
skyMat.mieCoefficient = 0.004;
skyMat.mieDirectionalG = 0.98;
skyMat.useSunPosition = true;
skyMat.sunPosition = sunLight.position;
skybox.material = skyMat;
skybox.infiniteDistance = true;

// ── REAL-TIME DAY/NIGHT ───────────────────────────
function updateDayNight(){
  const now = new Date();
  const hour = now.getHours() + now.getMinutes()/60;
  const dayStr = Math.max(0, Math.sin(((hour/24)-.25)*Math.PI*2));
  skyMat.inclination = -Math.sin(((hour/24)-.25)*Math.PI*2)*0.5;
  sunLight.intensity = 0.2 + dayStr*3.0;
  hemi.intensity = 0.2 + dayStr*0.65;
  if(hour>=6&&hour<9) sunLight.diffuse=new BABYLON.Color3(1,.65,.35);
  else if(hour>=9&&hour<17) sunLight.diffuse=new BABYLON.Color3(1,.97,.88);
  else if(hour>=17&&hour<20) sunLight.diffuse=new BABYLON.Color3(1,.5,.18);
  else { sunLight.diffuse=new BABYLON.Color3(.2,.25,.5); sunLight.intensity=0.15; }
  scene.fogColor = hour>=6&&hour<20
    ? new BABYLON.Color3(0.6,0.75,0.92)
    : new BABYLON.Color3(0.05,0.08,0.18);
  const h=now.getHours().toString().padStart(2,'0'), m=now.getMinutes().toString().padStart(2,'0');
  const label = hour<6||hour>=20?'🌙 Night':hour<9?'🌅 Sunrise':hour<17?'☀️ Day':'🌇 Sunset';
  document.getElementById('timeDisplay').textContent=`${h}:${m}  ·  ${label}`;
}
updateDayNight();
setInterval(updateDayNight, 30000);

// ── GROUND / TERRAIN ──────────────────────────────
setStatus("Building terrain...");
// Large grass ground
const ground = BABYLON.MeshBuilder.CreateGround("ground",{width:600,height:600,subdivisions:8},scene);
const gm = new BABYLON.StandardMaterial("gm",scene);
gm.diffuseColor = new BABYLON.Color3(0.28,0.4,0.18);
gm.specularColor = new BABYLON.Color3(0.02,0.02,0.02);
ground.material = gm;
ground.receiveShadows = true;

// Stone courtyard center
const court = BABYLON.MeshBuilder.CreateGround("court",{width:200,height:200},scene);
const cm = new BABYLON.StandardMaterial("cm",scene);
cm.diffuseColor = new BABYLON.Color3(0.58,0.54,0.46);
cm.specularColor = new BABYLON.Color3(0.04,0.04,0.04);
court.material = cm;
court.position.y = 0.04;
court.receiveShadows = true;

// Main stone paths
const pm = new BABYLON.StandardMaterial("pm",scene);
pm.diffuseColor = new BABYLON.Color3(0.46,0.42,0.36);
pm.specularColor = new BABYLON.Color3(0.03,0.03,0.03);
[[8,300,0,0],[300,8,0,0]].forEach(([w,h,x,z])=>{
  const p=BABYLON.MeshBuilder.CreateGround("p_"+w,{width:w,height:h},scene);
  p.material=pm; p.position=new BABYLON.Vector3(x,0.08,z); p.receiveShadows=true;
});

// ── MOUNTAINS ─────────────────────────────────────
setStatus("Sculpting mountains...");
[
  [-320,-250,100,180],[-200,-340,80,145],[380,-230,95,170],[220,-320,75,135],
  [-330,240,90,160],[280,270,88,165],[0,-380,110,195],[0,360,100,175],
  [-360,0,85,155],[340,80,92,168],[-160,-150,50,85],[160,-150,48,80],
  [-160,150,52,88],[160,150,46,78],[-260,-260,70,120],[260,-260,68,115],
  [-260,260,72,125],[260,260,66,110]
].forEach(([x,z,r,h],i)=>{
  const mm=new BABYLON.StandardMaterial("mm"+i,scene);
  mm.diffuseColor=new BABYLON.Color3(0.2+Math.random()*.1,0.24+Math.random()*.08,0.18+Math.random()*.06);
  mm.specularColor=new BABYLON.Color3(0.01,0.01,0.01);
  const mtn=BABYLON.MeshBuilder.CreateCylinder("mtn"+i,{diameterTop:0,diameterBottom:r*2,height:h,tessellation:7},scene);
  mtn.material=mm; mtn.position=new BABYLON.Vector3(x,h/2-8,z);
  mtn.rotation.y=Math.random()*Math.PI;
  shadowGen.addShadowCaster(mtn); mtn.receiveShadows=true;
  // Snow cap
  const sm2=new BABYLON.StandardMaterial("sm"+i,scene);
  sm2.diffuseColor=new BABYLON.Color3(0.9,0.93,0.98);
  const snow=BABYLON.MeshBuilder.CreateCylinder("snow"+i,{diameterTop:0,diameterBottom:r*.35,height:h*.28,tessellation:6},scene);
  snow.material=sm2; snow.position=new BABYLON.Vector3(x,h-10,z);
  // Secondary peak
  if(i<10){
    const mtn2=BABYLON.MeshBuilder.CreateCylinder("mtn2_"+i,{diameterTop:0,diameterBottom:r*1.2,height:h*.7,tessellation:6},scene);
    mtn2.material=mm; mtn2.position=new BABYLON.Vector3(x+r*.55,h*.7/2-8,z+r*.35);
    mtn2.rotation.y=Math.random()*Math.PI; shadowGen.addShadowCaster(mtn2);
  }
});

// ── RIVER ─────────────────────────────────────────
const river=BABYLON.MeshBuilder.CreateGround("river",{width:25,height:280},scene);
const rm2=new BABYLON.StandardMaterial("rm2",scene);
rm2.diffuseColor=new BABYLON.Color3(0.12,0.38,0.68);
rm2.specularColor=new BABYLON.Color3(0.9,0.95,1.0);
rm2.specularPower=128; rm2.alpha=0.82;
river.material=rm2; river.position=new BABYLON.Vector3(105,0.15,0);

// ── REALISTIC TREES ───────────────────────────────
setStatus("Planting forest...");
function pineTree(id,x,z,h=12){
  const trunkM=new BABYLON.StandardMaterial("tk"+id,scene);
  trunkM.diffuseColor=new BABYLON.Color3(0.22,0.13,0.07);
  trunkM.specularColor=new BABYLON.Color3(0.01,0.01,0.01);
  const trunk=BABYLON.MeshBuilder.CreateCylinder("tk"+id,{diameterTop:0.3,diameterBottom:0.7,height:h*.45,tessellation:7},scene);
  trunk.material=trunkM; trunk.position=new BABYLON.Vector3(x,h*.225,z);
  shadowGen.addShadowCaster(trunk); trunk.receiveShadows=true;
  const lc=new BABYLON.Color3(0.06+Math.random()*.1,0.22+Math.random()*.18,0.05+Math.random()*.08);
  const leafM=new BABYLON.StandardMaterial("lm"+id,scene);
  leafM.diffuseColor=lc; leafM.specularColor=new BABYLON.Color3(0.01,0.01,0.01);
  [0,1,2,3].forEach(i=>{
    const ly=h*(.38+i*.16), lr=h*(.28-i*.055);
    const cone=BABYLON.MeshBuilder.CreateCylinder("lf"+id+"_"+i,{diameterTop:.2,diameterBottom:lr*2.2,height:h*.34,tessellation:8},scene);
    cone.material=leafM; cone.position=new BABYLON.Vector3(x,ly,z);
    shadowGen.addShadowCaster(cone); cone.receiveShadows=true;
  });
}
function cherryTree(id,x,z,h=9){
  const trunkM=new BABYLON.StandardMaterial("ck"+id,scene);
  trunkM.diffuseColor=new BABYLON.Color3(0.3,0.16,0.08);
  const trunk=BABYLON.MeshBuilder.CreateCylinder("ck"+id,{diameterTop:0.25,diameterBottom:0.55,height:h*.5,tessellation:7},scene);
  trunk.material=trunkM; trunk.position=new BABYLON.Vector3(x,h*.25,z);
  shadowGen.addShadowCaster(trunk);
  const blossom=new BABYLON.Color3(0.88+Math.random()*.1,0.62+Math.random()*.15,0.7+Math.random()*.15);
  const bm=new BABYLON.StandardMaterial("bm"+id,scene);
  bm.diffuseColor=blossom; bm.specularColor=new BABYLON.Color3(0.02,0.02,0.02);
  for(let i=0;i<5;i++){
    const bx=x+(Math.random()-.5)*h*.4, bz2=z+(Math.random()-.5)*h*.4;
    const by=h*(.58+Math.random()*.22);
    const blob=BABYLON.MeshBuilder.CreateSphere("bl"+id+"_"+i,{diameter:h*(.2+Math.random()*.12),segments:6},scene);
    blob.material=bm;
    blob.scaling=new BABYLON.Vector3(1+Math.random()*.35,.75+Math.random()*.3,1+Math.random()*.35);
    blob.position=new BABYLON.Vector3(bx,by,bz2);
    shadowGen.addShadowCaster(blob); blob.receiveShadows=true;
  }
}
// Dense forest rings
let ti=0;
for(let ring=0;ring<4;ring++){
  const r=110+ring*32, count=30+ring*14;
  for(let i=0;i<count;i++){
    const angle=(i/count)*Math.PI*2+(ring*.4);
    const jit=(Math.random()-.5)*28;
    const x=Math.cos(angle)*r+jit, z=Math.sin(angle)*r+jit;
    const h=9+Math.random()*12;
    Math.random()<.28 ? cherryTree(ti++,x,z,h) : pineTree(ti++,x,z,h);
  }
}
// Accent trees in courtyard
[[-50,0],[50,0],[0,-50],[0,50],[-40,40],[40,40],[-40,-40],[40,-40],
 [-55,22],[-55,-22],[55,22],[55,-22],[22,-55],[-22,-55],[22,55],[-22,55]
].forEach(([x,z])=>Math.random()<.45?cherryTree(ti++,x,z,6+Math.random()*3):pineTree(ti++,x,z,7+Math.random()*4));

// ── ROCKS / BOULDERS ──────────────────────────────
const rkm=new BABYLON.StandardMaterial("rkm",scene);
rkm.diffuseColor=new BABYLON.Color3(0.38,0.38,0.4);
rkm.specularColor=new BABYLON.Color3(0.06,0.06,0.06);
[[-60,-40,1.4],[-59,-39,.8],[60,-40,1.2],[61,-39,.7],[-60,40,1.1],[60,40,1.3],
 [-35,60,.9],[35,60,.8],[-35,-60,1.0],[35,-60,.85],[68,5,1.2],[-68,5,.9]
].forEach(([x,z,s],i)=>{
  const r=BABYLON.MeshBuilder.CreateSphere("rk"+i,{diameter:s*3.2,segments:5},scene);
  r.material=rkm; r.position=new BABYLON.Vector3(x,s*.7,z);
  r.scaling=new BABYLON.Vector3(1+Math.random()*.5,.5+Math.random()*.35,1+Math.random()*.45);
  r.rotation.y=Math.random()*Math.PI*2;
  shadowGen.addShadowCaster(r); r.receiveShadows=true;
});

// ── TORII GATES ───────────────────────────────────
const toriiM=new BABYLON.StandardMaterial("tm",scene);
toriiM.diffuseColor=new BABYLON.Color3(0.78,0.1,0.06);
toriiM.specularColor=new BABYLON.Color3(0.15,0.05,0.03);
const goldM=new BABYLON.StandardMaterial("gm2",scene);
goldM.diffuseColor=new BABYLON.Color3(0.9,0.76,0.28);
goldM.emissiveColor=new BABYLON.Color3(0.12,0.1,0.0);

function torii(id,x,z,ry=0){
  const g=new BABYLON.TransformNode("tg"+id,scene);
  g.position=new BABYLON.Vector3(x,0,z); g.rotation.y=ry;
  for(let s of[-1,1]){
    const p=BABYLON.MeshBuilder.CreateCylinder("tp"+id+s,{diameterTop:.3,diameterBottom:.4,height:7.5,tessellation:10},scene);
    p.material=toriiM; p.position=new BABYLON.Vector3(s*2.5,3.75,0); p.parent=g;
    shadowGen.addShadowCaster(p);
    const base=BABYLON.MeshBuilder.CreateBox("tbs"+id+s,{width:.75,height:.5,depth:.75},scene);
    base.material=new BABYLON.StandardMaterial("tbsm"+id+s,scene);
    base.material.diffuseColor=new BABYLON.Color3(.32,.32,.35);
    base.position=new BABYLON.Vector3(s*2.5,-.02,0); base.parent=g;
  }
  const b1=BABYLON.MeshBuilder.CreateBox("tb1_"+id,{width:6.4,height:.42,depth:.42},scene);
  b1.material=toriiM; b1.position=new BABYLON.Vector3(0,4.5,0); b1.parent=g;
  shadowGen.addShadowCaster(b1);
  for(let s of[-1,1]){
    const cap=BABYLON.MeshBuilder.CreateBox("tc"+id+s,{width:.45,height:.42,depth:.6},scene);
    cap.material=toriiM; cap.position=new BABYLON.Vector3(s*3.4,4.72,0); cap.rotation.z=s*-.2; cap.parent=g;
  }
  const b2=BABYLON.MeshBuilder.CreateBox("tb2_"+id,{width:5.5,height:.34,depth:.34},scene);
  b2.material=toriiM; b2.position=new BABYLON.Vector3(0,4.0,0); b2.parent=g;

const fireLights=[];
function fireBowl(id,x,z){
  const sm3=new BABYLON.StandardMaterial("fsm"+id,scene);

  const bm3=new BABYLON.StandardMaterial("fbm"+id,scene);

  const fm=new BABYLON.StandardMaterial("ffm"+id,scene);
  fm.diffuseColor=new BABYLON.Color3(1,.5,.05);
  fm.emissiveColor=new BABYLON.Color3(.75,.28,0);
  const stand=BABYLON.MeshBuilder.CreateCylinder("fs"+id,{diameterTop:.07,diameterBottom:.07,height:1.4,tessellation:6},scene);
  stand.material=sm3; stand.position=new BABYLON.Vector3(x,.7,z);
  const bowl=BABYLON.MeshBuilder.CreateCylinder("fb"+id,{diameterTop:1.1,diameterBottom:.6,height:.55,tessellation:12},scene);
  bowl.material=bm3; bowl.position=new BABYLON.Vector3(x,1.45,z);
  const glow=BABYLON.MeshBuilder.CreateSphere("fg"+id,{diameter:.45},scene);
  glow.material=fm; glow.position=new BABYLON.Vector3(x,1.72,z);

}

// ── HANGING LANTERNS ──────────────────────────────
const lanternLights=[];
let lIdx=0;
function hangLantern(x,y,z,color,chainH=1.0){
  const root=new BABYLON.TransformNode("ln"+lIdx,scene);
  root.position=new BABYLON.Vector3(x,y,z);
  const cm2=new BABYLON.StandardMaterial("lc"+lIdx,scene);
  cm2.diffuseColor=new BABYLON.Color3(.45,.45,.45);
  const chain=BABYLON.MeshBuilder.CreateCylinder("lch"+lIdx,{diameterTop:.022,diameterBottom:.022,height:chainH,tessellation:4},scene);
  chain.material=cm2; chain.position=new BABYLON.Vector3(0,chainH/2,0); chain.parent=root;
  const bm4=new BABYLON.StandardMaterial("lb"+lIdx,scene);
  bm4.diffuseColor=new BABYLON.Color3(1,.94,.7);
  bm4.emissiveColor=BABYLON.Color3.FromHexString(color);
  bm4.alpha=.9;
  const body=BABYLON.MeshBuilder.CreateCylinder("lbd"+lIdx,{diameterTop:.28,diameterBottom:.28,height:.7,tessellation:10},scene);
  body.material=bm4; body.position=new BABYLON.Vector3(0,-.45,0); body.parent=root;
  const capm=new BABYLON.StandardMaterial("lcp"+lIdx,scene);
  capm.diffuseColor=new BABYLON.Color3(.22,.12,.05);
  const tc=BABYLON.MeshBuilder.CreateBox("ltc"+lIdx,{width:.28,height:.1,depth:.28},scene);
  tc.material=capm; tc.position=new BABYLON.Vector3(0,-.07,0); tc.parent=root;
  const bc=BABYLON.MeshBuilder.CreateBox("lbc"+lIdx,{width:.28,height:.1,depth:.28},scene);
  bc.material=capm; bc.position=new BABYLON.Vector3(0,-.82,0); bc.parent=root;
  const ll=new BABYLON.PointLight("ll"+lIdx,new BABYLON.Vector3(x,y-.45,z),scene);
  ll.diffuse=BABYLON.Color3.FromHexString(color);
  ll.intensity=1.2; ll.range=10; ll._base=1.2; lanternLights.push(ll);
  lIdx++;
}
function lanternString(x1,z1,x2,z2,y,n,color){
  const pts=[];
  for(let i=0;i<=18;i++){const t=i/18,sag=Math.sin(t*Math.PI)*-1.5;pts.push(new BABYLON.Vector3(x1+(x2-x1)*t,y+sag,z1+(z2-z1)*t));}
  const rope=BABYLON.MeshBuilder.CreateTube("rope"+lIdx,{path:pts,radius:.028,tessellation:4},scene);
  const rpm=new BABYLON.StandardMaterial("rpm"+lIdx,scene); rpm.diffuseColor=new BABYLON.Color3(.3,.22,.12); rope.material=rpm;
  for(let i=0;i<=n;i++){const t=i/n,sag=Math.sin(t*Math.PI)*-1.5;hangLantern(x1+(x2-x1)*t,y+sag-.05,z1+(z2-z1)*t,color,.9);}
}

let loadedCount=0;
function addTrigger(cfg,idx){
  const t=BABYLON.MeshBuilder.CreateBox("trig_"+cfg.id,{width:26,height:28,depth:26},scene);
  t.position=new BABYLON.Vector3(cfg.x,14,cfg.z); t.isPickable=true; t.visibility=0;
  BUILDINGS.push({mesh:t,...cfg});
  const bl=new BABYLON.PointLight("bl"+idx,new BABYLON.Vector3(cfg.x,18,cfg.z),scene);
  bl.diffuse=BABYLON.Color3.FromHexString(bldgColors[idx%6]);
  bl.intensity=2.2; bl.range=35; bl._base=2.2; lanternLights.push(bl);
}
function onOneLoaded(cfg,idx){ addTrigger(cfg,idx); loadedCount++; if(loadedCount>=buildingConfigs.length){setStatus("Village ready! 🐜⚔️");fadeIn();} }

buildingConfigs.forEach((cfg,idx)=>{
  setTimeout(()=>{
    setStatus(`Loading building ${idx+1} of ${buildingConfigs.length}...`);
    BABYLON.SceneLoader.ImportMeshAsync("","/","japanese_temple.glb",scene)
    .then(r=>{
      const root=new BABYLON.TransformNode("b_"+cfg.id,scene);
      root.position=new BABYLON.Vector3(cfg.x,0,cfg.z);
      root.rotation=new BABYLON.Vector3(0,cfg.ry,0);
      const scale=0.75;
      root.scaling=new BABYLON.Vector3(scale,scale,scale);
      r.meshes.forEach(m=>{
        if(!m.parent) m.parent=root;
        m.receiveShadows=true;
        try{shadowGen.addShadowCaster(m);}catch(e){}
        m.isPickable=false;
      });
      onOneLoaded(cfg,idx);
    })
    .catch(()=>{ buildFallback(cfg,idx); onOneLoaded(cfg,idx); });
  },idx*400);
});

function buildFallback(cfg,idx){
  const bm5=new BABYLON.PBRMaterial("fbm_"+cfg.id,scene);
  bm5.albedoColor=BABYLON.Color3.FromHexString(bldgColors[idx%6]);

  const walls=BABYLON.MeshBuilder.CreateBox("fw_"+cfg.id,{width:22,height:22,depth:18},scene);

// ── INTERACTION ───────────────────────────────────
const tooltip=document.getElementById('tooltip');
const panel=document.getElementById('panel');
scene.onPointerObservable.add(evt=>{
  if(evt.type!==BABYLON.PointerEventTypes.POINTERPICK||panel.classList.contains('open'))return;
  const hit=evt.pickInfo;
  if(!hit||!hit.hit)return;
  const b=BUILDINGS.find(b=>b.mesh===hit.pickedMesh);
  if(b)openPanel(b);
});
scene.onPointerObservable.add(evt=>{
  if(evt.type!==BABYLON.PointerEventTypes.POINTERMOVE||walkMode)return;
  const hit=scene.pick(scene.pointerX,scene.pointerY,m=>BUILDINGS.some(b=>b.mesh===m));
  if(hit&&hit.hit){
    const b=BUILDINGS.find(b=>b.mesh===hit.pickedMesh);
    if(b){document.getElementById('tt-title').textContent=b.title;document.getElementById('tt-sub').textContent=b.sub;tooltip.classList.add('visible');canvas.style.cursor='pointer';return;}
  }
  tooltip.classList.remove('visible');canvas.style.cursor='default';
});
document.getElementById('panel-close').addEventListener('click',()=>panel.classList.remove('open'));
function openPanel(b){
  document.getElementById('panel-icon').textContent=b.icon;
  document.getElementById('panel-title').textContent=b.title;
  document.getElementById('panel-sub').textContent=b.sub;
  document.getElementById('panel-desc').textContent=b.desc;
  const acts=document.getElementById('panel-actions');acts.innerHTML='';
  b.actions.forEach(a=>{const btn=document.createElement('a');btn.className='pb'+(a.g?' g':a.t?' t':a.r?' r':'');btn.textContent=a.label;btn.href=a.href;btn.target='_blank';btn.rel='noopener';acts.appendChild(btn);});
  panel.classList.add('open');
}

// ── WALK MODE ─────────────────────────────────────
function toggleWalk(){
  walkMode=!walkMode;
  const btn=document.getElementById('walkBtn'), ch=document.getElementById('crosshair');
  if(walkMode){
    scene.activeCamera=walkCam;walkCam.attachControl(canvas,true);orbitCam.detachControl();
    canvas.requestPointerLock();
    btn.textContent='🌐  EXIT WALK MODE';btn.classList.add('active');ch.classList.add('visible');
  } else {
    scene.activeCamera=orbitCam;orbitCam.attachControl(canvas,true);walkCam.detachControl();
    document.exitPointerLock();
    btn.textContent='⚔️  ENTER VILLAGE';btn.classList.remove('active');ch.classList.remove('visible');
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&walkMode)toggleWalk();});

// ── RENDER LOOP ───────────────────────────────────
let t=0;
engine.runRenderLoop(()=>{
  t+=engine.getDeltaTime()*.001;
  fireLights.forEach(fl=>{ fl.intensity=fl._base+Math.sin(t*9.2+fl.position.x*3)*.65+Math.sin(t*15+fl.position.z)*.32; });
  lanternLights.forEach(ll=>{ if(ll._base)ll.intensity=ll._base+Math.sin(t*1.9+ll.position.x*.3)*.1; });
  // Animate player if walking
  if(playerMesh&&walkMode){
    const keys={w:scene.actionManager,forward:false};
    // Simple player follows camera direction when keys pressed
  }
  scene.render();
});
window.addEventListener('resize',()=>engine.resize());

function fadeIn(){
  setTimeout(()=>{const ld=document.getElementById('loading');ld.style.opacity='0';setTimeout(()=>ld.style.display='none',1000);},600);
}
