<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rebel Ants — The Hidden Village</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Georgia',serif;}

/* ── BABYLON BACKGROUND ── */
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}

/* ── VIGNETTE OVERLAY ── */
#vignette{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;
  background:radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.85) 100%);
  pointer-events:none;
}

/* ── SCANLINE OVERLAY ── */
#scanlines{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);
  pointer-events:none;
}

/* ── MAIN UI ── */
#ui{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:32px;
}

/* ── LOGO ── */
#logo-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
#logo{width:320px;max-width:80vw;filter:drop-shadow(0 0 30px rgba(255,180,50,0.4));
  animation:float 4s ease-in-out infinite;}
#logo-placeholder{
  color:#c8922a;font-size:42px;font-weight:bold;letter-spacing:8px;text-transform:uppercase;
  text-shadow:0 0 40px rgba(200,146,42,0.8),0 2px 4px rgba(0,0,0,0.9);
  display:none;
}
#logo-sub{color:#8a7a5a;font-size:13px;letter-spacing:6px;text-transform:uppercase;
  text-shadow:0 1px 3px rgba(0,0,0,0.9);}

@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

/* ── CHARACTER SELECT ── */
#char-section{display:flex;flex-direction:column;align-items:center;gap:16px;}
#char-label{color:#8a7a5a;font-size:11px;letter-spacing:5px;text-transform:uppercase;}
#char-row{display:flex;gap:16px;align-items:center;}

.ant-card{
  width:90px;height:90px;border-radius:8px;cursor:pointer;
  border:2px solid rgba(200,146,42,0.3);overflow:hidden;
  background:rgba(0,0,0,0.6);transition:all 0.2s ease;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.ant-card img{width:100%;height:100%;object-fit:cover;}
.ant-card:hover{border-color:rgba(200,146,42,0.9);transform:scale(1.08);
  box-shadow:0 0 20px rgba(200,146,42,0.4);}
.ant-card.selected{border-color:#c8922a;box-shadow:0 0 25px rgba(200,146,42,0.6);}
.ant-card.locked{opacity:0.35;cursor:not-allowed;}
.ant-card.locked:hover{transform:none;border-color:rgba(200,146,42,0.3);}
.lock-icon{position:absolute;font-size:22px;color:rgba(255,255,255,0.5);}
.ant-name{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,0.7);color:#c8922a;font-size:9px;
  letter-spacing:2px;text-align:center;padding:3px;text-transform:uppercase;
}

/* ── BUTTONS ── */
#btn-row{display:flex;gap:16px;align-items:center;}

.btn{
  padding:14px 36px;font-size:13px;letter-spacing:4px;text-transform:uppercase;
  border:none;cursor:pointer;transition:all 0.2s ease;font-family:'Georgia',serif;
}
#btn-enter{
  background:linear-gradient(135deg,#c8922a,#8a5e1a);color:#fff;
  box-shadow:0 4px 20px rgba(200,146,42,0.4);
}
#btn-enter:hover{box-shadow:0 6px 30px rgba(200,146,42,0.7);transform:translateY(-2px);}
#btn-enter:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

#btn-wallet{
  background:transparent;color:#8a7a5a;
  border:1px solid rgba(138,122,90,0.4);font-size:11px;
}
#btn-wallet:hover{color:#c8922a;border-color:rgba(200,146,42,0.6);}
#btn-wallet.connected{color:#6abf6a;border-color:rgba(106,191,106,0.4);}

/* ── NEWS TICKER ── */
#ticker{
  position:fixed;bottom:0;left:0;right:0;z-index:11;
  background:rgba(0,0,0,0.8);border-top:1px solid rgba(200,146,42,0.2);
  padding:10px 0;overflow:hidden;
}
#ticker-inner{
  display:inline-block;white-space:nowrap;
  animation:ticker 30s linear infinite;
  color:#8a7a5a;font-size:11px;letter-spacing:3px;
}
@keyframes ticker{0%{transform:translateX(100vw);}100%{transform:translateX(-100%);}}

/* ── LOADING SCREEN ── */
#loading{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;
  background:#000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;
  transition:opacity 1s ease;
}
#loading.hidden{opacity:0;pointer-events:none;}
#loading-text{color:#8a7a5a;font-size:11px;letter-spacing:5px;text-transform:uppercase;}
#loading-bar-wrap{width:200px;height:2px;background:rgba(255,255,255,0.1);}
#loading-bar{height:100%;width:0%;background:#c8922a;transition:width 0.3s ease;}

/* ── ENTER TRANSITION ── */
#blackout{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:99;
  background:#000;opacity:0;pointer-events:none;transition:opacity 0.8s ease;
}
#blackout.active{opacity:1;}

/* ── VERSION ── */
#version{
  position:fixed;bottom:36px;right:16px;z-index:12;
  color:rgba(138,122,90,0.4);font-size:10px;letter-spacing:2px;
}
</style>
</head>
<body>

<!-- Background village render -->
<canvas id="bgCanvas"></canvas>
<div id="vignette"></div>
<div id="scanlines"></div>

<!-- Loading screen -->
<div id="loading">
  <div id="loading-text">Initializing Village...</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<!-- Blackout for enter transition -->
<div id="blackout"></div>

<!-- Main UI -->
<div id="ui" style="opacity:0;transition:opacity 1.5s ease;">

  <!-- Logo -->
  <div id="logo-wrap">
    <img id="logo" src="assets/lobby/logo.png" alt="Rebel Ants"
      onerror="this.style.display='none';document.getElementById('logo-placeholder').style.display='block'"/>
    <div id="logo-placeholder">REBEL ANTS</div>
    <div id="logo-sub">The Hidden Village</div>
  </div>

  <!-- Character Select -->
  <div id="char-section">
    <div id="char-label">Select Your Rebel</div>
    <div id="char-row" id="charRow"></div>
  </div>

  <!-- Buttons -->
  <div id="btn-row">
    <button class="btn" id="btn-wallet" onclick="connectWallet()">Connect Wallet</button>
    <button class="btn" id="btn-enter" onclick="enterVillage()">Enter Village</button>
  </div>

</div>

<!-- News ticker -->
<div id="ticker">
  <span id="ticker-inner">
    ✦ REBEL ANTS — THE HIDDEN VILLAGE &nbsp;&nbsp;&nbsp;
    ✦ Season 1 Now Live &nbsp;&nbsp;&nbsp;
    ✦ New dojos coming soon &nbsp;&nbsp;&nbsp;
    ✦ The Foundry — AI character generation coming &nbsp;&nbsp;&nbsp;
    ✦ Hold your ant. Enter the village. &nbsp;&nbsp;&nbsp;
  </span>
</div>

<div id="version">v0.1 DEV</div>

<!-- Babylon.js for background cinematic -->
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>

<script>
// ── ANTS CONFIG ──
const ANTS = [
  { id:'ant_1', name:'Rebel #001', src:'assets/lobby/ant_1.JPG', locked:false },
  { id:'ant_2', name:'Rebel #002', src:'assets/lobby/ant_2.png', locked:true },
  { id:'ant_3', name:'Rebel #003', src:'assets/lobby/ant_3.png', locked:true },
  { id:'ant_4', name:'Rebel #004', src:'assets/lobby/ant_4.png', locked:true },
];

let selectedAnt = 'ant_1';

// Build character cards
const charRow = document.getElementById('char-row');
ANTS.forEach(ant => {
  const card = document.createElement('div');
  card.className = 'ant-card' + (ant.locked ? ' locked' : '') + (ant.id === selectedAnt ? ' selected' : '');
  card.id = 'card_' + ant.id;
  if (!ant.locked) card.onclick = () => selectAnt(ant.id);
  card.innerHTML = ant.locked
    ? `<span class="lock-icon">🔒</span><div class="ant-name">${ant.name}</div>`
    : `<img src="${ant.src}" onerror="this.style.display='none'"/><div class="ant-name">${ant.name}</div>`;
  charRow.appendChild(card);
});

function selectAnt(id) {
  selectedAnt = id;
  document.querySelectorAll('.ant-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('card_' + id).classList.add('selected');
}

// ── WALLET ──
let walletConnected = false;
async function connectWallet() {
  const btn = document.getElementById('btn-wallet');
  // Disconnect if already connected
  if (walletConnected) {
    walletConnected = false;
    btn.textContent = 'Connect Wallet';
    btn.classList.remove('connected');
    return;
  }
  if (typeof window.ethereum === 'undefined') {
    btn.textContent = 'No Wallet Found';
    return;
  }
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    walletConnected = true;
    const addr = accounts[0];
    btn.textContent = addr.slice(0,6) + '...' + addr.slice(-4);
    btn.classList.add('connected');
    btn.title = 'Click to disconnect';
  } catch(e) {
    btn.textContent = 'Rejected';
  }
}

// ── ENTER VILLAGE ──
function enterVillage() {
  const blackout = document.getElementById('blackout');
  blackout.classList.add('active');
  // Stop music gracefully
  if (window._music) {
    window._music.volume = 0;
  }
  setTimeout(() => {
    window.location.href = 'village.html';
  }, 900);
}

// ── AMBIENT MUSIC ──
function startMusic() {
  const audio = new Audio('assets/lobby/ambient.mp3');
  audio.loop = true;
  audio.volume = 0;
  audio.play().catch(() => {});
  // Fade in
  let v = 0;
  const fade = setInterval(() => {
    v = Math.min(v + 0.02, 0.4);
    audio.volume = v;
    if (v >= 0.4) clearInterval(fade);
  }, 100);
  window._music = audio;
}

// ── BABYLON BACKGROUND SCENE ──
function initBgScene() {
  const canvas = document.getElementById('bgCanvas');
  const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer:false, stencil:false });

  const scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0.02, 0.03, 0.04, 1);
  scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
  scene.fogDensity = 0.008;
  scene.fogColor = new BABYLON.Color3(0.02, 0.03, 0.04);

  // Cinematic camera — slow orbital sweep
  const cam = new BABYLON.ArcRotateCamera('cam', -Math.PI/3, Math.PI/3.5, 180, new BABYLON.Vector3(0,10,0), scene);
  cam.lowerRadiusLimit = 160;
  cam.upperRadiusLimit = 220;

  // Lighting — moody night
  const hemi = new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0,1,0), scene);
  hemi.intensity = 0.15;
  hemi.diffuse = new BABYLON.Color3(0.4, 0.5, 0.7);
  hemi.groundColor = new BABYLON.Color3(0.05, 0.05, 0.1);

  const dir = new BABYLON.DirectionalLight('dir', new BABYLON.Vector3(-1,-2,-1), scene);
  dir.intensity = 0.4;
  dir.diffuse = new BABYLON.Color3(0.6, 0.7, 1.0);

  // Ground plane
  const ground = BABYLON.MeshBuilder.CreateGround('g', {width:700, height:700}, scene);
  const gMat = new BABYLON.StandardMaterial('gm', scene);
  gMat.diffuseColor = new BABYLON.Color3(0.08, 0.12, 0.06);
  gMat.specularColor = new BABYLON.Color3(0,0,0);
  ground.material = gMat;

  // A few silhouette mountains for depth
  const mColors = [
    new BABYLON.Color3(0.06,0.09,0.07),
    new BABYLON.Color3(0.05,0.08,0.06),
    new BABYLON.Color3(0.07,0.10,0.08),
  ];
  [[-260,-200,80,160],[-180,-300,65,130],[300,-220,75,150],
   [-300,220,70,140],[250,260,85,165],[0,-360,90,175]].forEach(([x,z,r,h],i) => {
    const m = BABYLON.MeshBuilder.CreateCylinder('mt'+i,{diameterTop:0,diameterBottom:r*2,height:h,tessellation:8},scene);
    m.position.set(x, h/2-2, z);
    const mm = new BABYLON.StandardMaterial('mtm'+i, scene);
    mm.diffuseColor = mColors[i % mColors.length];
    mm.specularColor = new BABYLON.Color3(0,0,0);
    m.material = mm;
  });

  // Floating particles (fireflies)
  const ps = new BABYLON.ParticleSystem('fireflies', 60, scene);
  ps.particleTexture = new BABYLON.Texture('https://playground.babylonjs.com/textures/flare.png', scene);
  ps.emitter = new BABYLON.Vector3(0,5,0);
  ps.minEmitBox = new BABYLON.Vector3(-80,0,-80);
  ps.maxEmitBox = new BABYLON.Vector3(80,20,80);
  ps.color1 = new BABYLON.Color4(0.8,1.0,0.4,1);
  ps.color2 = new BABYLON.Color4(0.6,0.9,0.2,0.8);
  ps.colorDead = new BABYLON.Color4(0,0,0,0);
  ps.minSize = 0.3; ps.maxSize = 0.8;
  ps.minLifeTime = 3; ps.maxLifeTime = 8;
  ps.emitRate = 8;
  ps.minEmitPower = 0.1; ps.maxEmitPower = 0.3;
  ps.updateSpeed = 0.01;
  ps.start();

  // Slow camera orbit
  let angle = -Math.PI/3;
  engine.runRenderLoop(() => {
    angle += 0.0003;
    cam.alpha = angle;
    cam.radius = 185 + Math.sin(angle * 0.3) * 20;
    cam.beta = Math.PI/3.5 + Math.sin(angle * 0.2) * 0.05;
    scene.render();
  });

  window.addEventListener('resize', () => engine.resize());
  return scene;
}

// ── BOOT SEQUENCE ──
let progress = 0;
const bar = document.getElementById('loading-bar');

function setProgress(p) {
  progress = p;
  bar.style.width = p + '%';
}

// Start music on first user interaction
document.addEventListener('click', function startOnClick() {
  startMusic();
  document.removeEventListener('click', startOnClick);
}, { once: true });

window.addEventListener('load', () => {
  setProgress(20);
  setTimeout(() => {
    initBgScene();
    setProgress(60);
    setTimeout(() => {
      setProgress(100);
      setTimeout(() => {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('ui').style.opacity = '1';
        startMusic();
      }, 600);
    }, 800);
  }, 300);
});
</script>
</body>
</html>
